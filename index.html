         <tr><td style="padding:6px 10px;border:1px solid #30363d font-weight:600">Causes</td><td style="padding:6px 10px;border:1px solid #30363d">CVA; TBI; non-ketotic hyperglycaemia; neoplasm; demyelination; tuberculoma</td><td style="padding:6px 10px;border:1px solid #30363d">Huntington's disease; Sydenham's chorea (post-Strep); antipsychotic drugs; CVA; hyperthyroidism</td><td style="padding:6px 10px;border:1px solid #30363d">Structural lesion; drug toxicity/withdrawal; infection; head injury; hypoglycaemia; idiopathic</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d">Brain area</td><td style="padding:6px 10px;border:1px solid #30363d">Subthalamic nucleus of basal ganglia</td><td style="padding:6px 10px;border:1px solid #30363d">Corpus striatum of basal ganglia</td><td style="padding:6px 10px;border:1px solid #30363d">Anywhere in brain (focal cortical)</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d">Typical features</td><td style="padding:6px 10px;border:1px solid #30363d">Large amplitude, irregular flinging movements of proximal muscles; one side of body</td><td style="padding:6px 10px;border:1px solid #30363d">Continuous random irregular movements; flow from one body part to another; no pattern</td><td style="padding:6px 10px;border:1px solid #30363d">Rapid repetitive contractions; usually one body part; may have altered consciousness; can generalise</td></tr>
       </table>`}

    topics:["Neurology","Haematology"],
    subtopics:["Other Neurological","Coagulopathy & Bleeding"],
    title:"85yo confused on warfarin, bilateral subdural haematoma — CT findings, investigations, anticoag reversal, ACD management",

       a:`<ul><li><strong>Urethral trauma</strong> — especially in males; do not catheterise until urethra cleared</li><li><strong>Rectal injuries</strong></li><li><strong>Vaginal injuries</strong></li><li><strong>Scrotal injuries</strong></li><li>Bladder injury; vascular injury (iliac vessels); lumbosacral nerve injury</li></ul>`},
      {q:"(c) What immediate intervention is required? (1 mark)",
       a:`<p><strong>Application of a trochanteric sling (pelvic binder)</strong> — reduces pelvic volume, tamponades venous bleeding, provides stability. Apply at level of greater trochanters, not over iliac crests.</p>`},
      {q:"(d) Describe the key CT findings. (3 marks)",
       a:`<ul><li><strong>Pelvic haematoma</strong></li><li><strong>Catheter balloon visible</strong></li><li><strong>Contrast blush consistent with active/ongoing bleeding</strong> — likely arterial source (venous blush tends to be less discrete)</li></ul>`},
      {q:"(e) Compare definitive management options — benefits and limitations. (4 marks)",
       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
         <tr style="background:rgba(255,255,255,0.08)"><th style="padding:6px 10px;border:1px solid #30363d">Option</th><th style="padding:6px 10px;border:1px solid #30363d">Benefits</th><th style="padding:6px 10px;border:1px solid #30363d">Limitations</th></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>Theatre — pelvic stabilisation + packing</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Definitive treatment for symphysis injury; controls bleeding directly; can repair associated injuries simultaneously</td><td style="padding:6px 10px;border:1px solid #30363d">Minimal surgical planning time for complex surgery; may require 2-stage procedure</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>Interventional radiology — embolisation</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Minimally invasive; controls arterial bleeding with less risk of end-organ ischaemia</td><td style="padding:6px 10px;border:1px solid #30363d">Still requires theatre for fracture fixation; bleeding often stops by time of procedure; not available 24/7 at all centres</td></tr>
       </table>`}
    ]
  },

  {
    id:"sant_2020_1_q2",paper:"SA/NT 2020.1",qnum:"Q2",marks:14,
    topics:["Obstetrics & Gynaecology","Respiratory"],
    subtopics:["Obstetric Emergencies","Acute Breathlessness"],
    title:"PE in pregnancy — ECG interpretation, D-dimer utility, imaging options with pros and cons",
    stem:"A pregnant patient (3rd trimester) presents with suspected pulmonary embolism. An ECG is performed.",
    parts:[
      {q:"(a) Describe the ECG findings consistent with PE. (4 marks)",
       a:`<ul><li><strong>Sinus tachycardia</strong> — most common ECG finding in PE</li><li><strong>RBBB</strong> — right heart strain pattern</li><li><strong>Extreme right axis deviation</strong> — acute cor pulmonale</li><li><strong>T-wave inversion in V1–4</strong> and/or inferior leads — right ventricular strain</li><li><strong>S1Q3T3</strong> — deep S wave in I, Q wave in III, inverted T in III — not sensitive or specific but classic exam finding</li></ul>`},
      {q:"(b) Is D-dimer useful in this patient? Justify. (2 marks)",
       a:`<p><strong>Equivocal — depends on clinical context:</strong></p>
       <ul><li><strong>Reason not to use:</strong> D-dimer has poor specificity in the 3rd trimester — physiologically elevated in normal pregnancy, leading to high false-positive rate. Wells score is also not validated in the pregnant population.</li><li><strong>Reason to use:</strong> The pregnancy-adapted YEARS algorithm — if no YEARS criteria and D-dimer &lt;1.0 g/L (or standard &lt;500 with no criteria), imaging can be safely avoided.</li></ul>`},
      {q:"(c) Compare imaging options for PE in pregnancy — pros and cons for each. (12 marks)",
       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
         <tr style="background:rgba(255,255,255,0.08)"><th style="padding:6px 10px;border:1px solid #30363d">Modality</th><th style="padding:6px 10px;border:1px solid #30363d">Pros</th><th style="padding:6px 10px;border:1px solid #30363d">Cons</th></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>CTPA</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Excludes other diagnoses; defines clot burden; less foetal radiation than V/Q</td><td style="padding:6px 10px;border:1px solid #30363d">Significant radiation to maternal breast tissue (increased lifetime breast cancer risk); contrast allergy risk; potential AKI</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>V/Q scan</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Less radiation to breast tissue (especially half-dose perfusion scan); preferred in young women</td><td style="padding:6px 10px;border:1px solid #30363d">Higher foetal radiation dose; higher rate of indeterminate studies; not always available after hours</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>Lower limb DVT USS</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Non-invasive; no radiation; no contrast; if positive enables anticoagulation without further imaging</td><td style="padding:6px 10px;border:1px solid #30363d">Negative study unhelpful — may have proximal pelvic vein DVT not seen; DVT only present in ~8% of pregnant patients with suspected PE</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>Trans-thoracic echo (TTE)</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Bedside; non-invasive; useful when haemodynamically unstable; can assess RV strain and clot burden</td><td style="padding:6px 10px;border:1px solid #30363d">Non-diagnostic; operator-dependent; cannot confirm PE, only suggests it</td></tr>
       </table>`}
    ]
  },

  {
    id:"sant_2020_1_q3",paper:"SA/NT 2020.1",qnum:"Q3",marks:14,
    topics:["Environmental & Burns","Toxicology"],
    subtopics:["Environmental Emergencies","Overdose & Poisoning"],
    title:"Altered consciousness with hyperthermia — differentials, cooling, rhabdomyolysis labs, fluid management",
    stem:"A patient presents with altered consciousness and hyperthermia.",
    parts:[
      {q:"(a) List the differential diagnoses. (5 marks)",
       a:`<ul><li><strong>Classical heat stroke</strong></li><li><strong>Sepsis</strong></li><li><strong>Meningitis / encephalitis</strong></li><li><strong>Serotonin syndrome</strong></li><li><strong>Neuroleptic malignant syndrome (NMS)</strong></li><li>Anticholinergic toxidrome; stimulant overdose; thyroid storm</li></ul>`},
      {q:"(b) List initial management priorities. (3 marks)",
       a:`<ul><li><strong>Cooling:</strong> Remove clothing; cool room temperature; cool IV fluids; evaporative cooling with fan; ice packs to axillae and groin</li><li><strong>Antibiotics</strong> — broad spectrum if no infective focus apparent; cover meningitis</li><li><strong>Sedation</strong> if NMS or serotonin syndrome (benzodiazepines first line)</li><li>Airway protection — consider intubation if GCS impaired; glucose management; treat hyperkalaemia</li></ul>`},
      {q:"(c) List the expected biochemical abnormalities in rhabdomyolysis. (3 marks)",
       a:`<p><strong>Early:</strong></p>
       <ul><li>Hypokalaemia (released K not yet causing hyperK); hyperphosphataemia; hypercalcaemia (calcium into damaged muscle)</li></ul>
       <p><strong>Late:</strong></p>
       <ul><li>Hyperkalaemia; hypocalcaemia; raised lactate; markedly elevated CK; elevated LFTs (AST, LDH); AKI (high urea:creatinine ratio); hyperuricaemia</li></ul>`},
      {q:"(d) Outline your fluid management approach. (3 marks)",
       a:`<ul><li><strong>Use normal saline or 0.45% saline</strong> — avoid lactated Ringer's (contains K) and other K-containing fluids</li><li><strong>Cautious fluid administration</strong> — vasoconstriction from cooling increases risk of pulmonary oedema; monitor CVP and urine output</li><li><strong>Avoid adrenergic agents</strong> — cause peripheral vasoconstriction and impair heat dissipation; consider low-dose dopamine if vasopressor needed</li><li>Monitor: temperature probe, urine output, blood pressure continuously</li></ul>`}
    ]
  },

  {
    id:"sant_2020_1_q4",paper:"SA/NT 2020.1",qnum:"Q4",marks:12,
    topics:["Paediatrics","Gastrointestinal"],
    subtopics:["Paediatric Emergencies","Upper GI & Abdominal"],
    title:"Paediatric button battery and foreign body ingestion — history, X-ray features, coin vs battery, indications for removal",
    stem:"A child presents after suspected foreign body ingestion. History of battery ingestion is being considered.",
    parts:[
      {q:"(a) What specific history features are important? (4 marks)",
       a:`<ul><li><strong>Battery type</strong> — lithium batteries ≥20mm diameter carry highest risk (compare: $2 coin = 20mm, 10c = 23mm, $1 = 25mm, 20c = 27mm)</li><li><strong>Battery charge state</strong> — new batteries ≥20mm are highest risk; even "dead" batteries can cause significant damage</li><li><strong>Number of batteries ingested</strong> — multiple batteries associated with more severe outcomes</li><li><strong>Magnet co-ingestion</strong> — battery + magnet can trap bowel wall between them causing necrosis/perforation</li><li><strong>Time of ingestion</strong> — damage begins within 2–4 hours, ulceration within hours, perforation possible</li></ul>`},
      {q:"(b) What imaging is required? (1 mark)",
       a:`<p><strong>Biplane radiographs (AP and lateral) from nasopharynx to anus</strong> — single view misses pharyngeal FB, depth, or multiple objects</p>`},
      {q:"(c) How do you distinguish a coin from a button battery on X-ray? (2 marks)",
       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
         <tr style="background:rgba(255,255,255,0.08)"><th style="padding:6px 10px;border:1px solid #30363d">Object</th><th style="padding:6px 10px;border:1px solid #30363d">X-ray Appearance</th></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>Coin</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Circular flat object; homogenous opacity; sharp crisp edge</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>Button battery</strong></td><td style="padding:6px 10px;border:1px solid #30363d"><strong>Double-ring or halo sign</strong> on AP view (bilaminar structure); <strong>step-off</strong> between anode and cathode on lateral view</td></tr>
       </table>`},
      {q:"(d) List indications for urgent endoscopic removal of a foreign body. (5 marks)",
       a:`<ul><li><strong>Button battery in oesophagus</strong> — necrosis within hours from electrical current; ulceration and perforation can occur rapidly; also consider if in stomach</li><li><strong>Sharp object in oesophagus or proximal GI tract</strong> — 15–20% perforation risk if lodged proximally</li><li><strong>Long object &gt;5 cm in proximal GI tract</strong> — unable to negotiate duodenal sweep</li><li><strong>Airway compromise</strong> — tracheal compression</li><li><strong>High-powered (neodymium) magnets</strong> — multiple magnets can trap bowel causing perforation; even single magnet requires caution</li><li>Oesophageal obstruction — unable to swallow secretions</li><li>Signs of obstruction/peritonitis — fever, abdominal pain, vomiting</li><li>Object in oesophagus &gt;24 hours or unknown time</li></ul>`}
    ]
  },

  {
    id:"sant_2020_1_q5",paper:"SA/NT 2020.1",qnum:"Q5",marks:12,
    topics:["Haematology","Cardiovascular"],
    subtopics:["Coagulopathy & Bleeding","Arrhythmias"],
    title:"GI bleed on NOAC (AF patient) — resuscitation, factors affecting NOAC reversal, reversal agents and doses",
    stem:"A patient with AF on a NOAC presents with significant GI haemorrhage.",
    parts:[
      {q:"(a) Outline initial resuscitation steps. (4 marks)",
       a:`<ul><li>Supplemental oxygen</li><li>2 large-bore IVs (≥18G)</li><li>Labs: FBC, CMP, coagulation studies, type and crossmatch</li><li>VBG — Hb, BSL, lactate</li><li>Crystalloid fluid challenge; prepare for transfusion if unresponsive to 2L</li><li>ECG to confirm AF rhythm</li><li>CXR — assess for APO, aspiration, intercurrent infection</li><li>NG tube placement if upper GI bleed suspected</li></ul>`},
      {q:"(b) What patient factors affect your approach to NOAC reversal? (2 marks)",
       a:`<ul><li><strong>Renal dysfunction</strong> — dabigatran is 85% renally excreted; impaired clearance increases drug level and effect</li><li><strong>Liver disease</strong> — independent coagulopathy risk; Xa inhibitors (rivaroxaban) partly hepatically metabolised</li><li><strong>Time of last dose</strong> — short half-life means recent dose = higher drug level</li><li><strong>Drug interactions</strong> — amiodarone, diltiazem, verapamil increase NOAC levels</li></ul>`},
      {q:"(c) Complete the reversal agent table for dabigatran and rivaroxaban. (6 marks)",
       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
         <tr style="background:rgba(255,255,255,0.08)"><th style="padding:6px 10px;border:1px solid #30363d">Drug</th><th style="padding:6px 10px;border:1px solid #30363d">Mechanism</th><th style="padding:6px 10px;border:1px solid #30363d">Reversal Strategy</th></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>Dabigatran</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Direct thrombin (IIa) inhibition</td><td style="padding:6px 10px;border:1px solid #30363d"><strong>Idarucizumab 5g IV</strong> (specific antidote); PCC 25–50 units/kg IV; Dialysis (dabigatran is dialysable)</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>Rivaroxaban / Enoxaparin</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Direct Xa inhibition</td><td style="padding:6px 10px;border:1px solid #30363d"><strong>PCC 25–50 units/kg IV</strong>; Andexanet alfa (not available in Australia)</td></tr>
       </table>`}
    ]
  },

  {

    topics:["Paediatrics","Orthopaedics"],
    subtopics:["Paediatric Emergencies","Child Protection"],
    title:"Non-weight bearing toddler with tibial periosteal reaction — differentials, developmental milestones, X-ray, safeguarding",
    stem:"A toddler presents not weight-bearing. X-ray of the right leg shows periosteal reaction of the tibia with soft tissue swelling, inconsistent with the current presentation and suggesting an injury 7–10 days prior.",
    images:[{src:"images/SANT 20201_6_Femur.webp",caption:"Right tibia X-ray AP and lateral — describe findings and significance"}],
    parts:[
      {q:"(a) List differential diagnoses for a non-weight bearing toddler. (4 marks)",
       a:`<ul><li><strong>Toddler's fracture</strong> — most likely; spiral tibial fracture from minor twisting</li><li><strong>Irritable hip / transient synovitis</strong></li><li><strong>Osteomyelitis</strong></li><li><strong>Septic arthritis</strong></li><li>Congenital dislocation of hip (if missed in screening); malignant tumour (e.g. Ewing's sarcoma)</li><li><em>Note: Perthes (age 4–8) and SCFE (early puberty) would not be accepted for this age</em></li></ul>`},
      {q:"(b) List normal developmental milestones relevant to assessing injury plausibility. (4 marks)",
       a:`<ul><li>Crawl in any way — <strong>10 months</strong></li><li>Pull to stand — <strong>11 months</strong></li><li>Cruising (walking holding furniture) — <strong>14 months</strong></li><li>Walk independently — <strong>18 months</strong></li></ul>
       <p><em>Knowing these allows you to assess whether a proposed injury mechanism (e.g. fell while walking) is developmentally plausible for the child's age.</em></p>`},
      {q:"(c) Describe the X-ray findings and their significance. (2 marks)",
       a:`<ul><li><strong>Marked periosteal reaction of the tibia</strong> with adjacent soft tissue swelling</li><li>These findings are <strong>inconsistent with the current presentation</strong> — suggest a significant tibial injury approximately <strong>7–10 days ago</strong> that has not been disclosed</li></ul>`},
      {q:"(d) How do you manage this situation? (3 marks)",
       a:`<ul><li><strong>Explain findings to the mother non-judgementally</strong> — describe the anomalous radiological finding and what it suggests</li><li><strong>Take a further careful history</strong> — explore whether she can provide a plausible, reassuring mechanism for an injury in the last 7–10 days (e.g. fall during early walking)</li><li><strong>If a plausible explanation is provided:</strong> discharge with fracture clinic follow-up</li><li><strong>If no satisfactory explanation:</strong> notify the statutory child protection agency (SA = Department for Child Protection) and consult the Child Protection Paediatrician on call</li></ul>`}
    ]
  },

  {
    id:"sant_2020_1_q7",paper:"SA/NT 2020.1",qnum:"Q7",marks:14,
    topics:["ENT","Critical Care & Procedures"],
    subtopics:["ENT Emergencies","Airway Management"],
    title:"Tongue and floor-of-mouth swelling — angioedema differentials, causes, hereditary angioedema treatment, difficult airway",
    stem:"A patient presents with rapid onset tongue and floor-of-mouth swelling causing stridor.",
    images:[{src:"images/SANT 20201_7_TongueSwelling.webp",caption:"Clinical photo — describe the airway concern and likely diagnosis"}],
    parts:[
      {q:"(a) List differential diagnoses for tongue/floor-of-mouth swelling. (4 marks)",
       a:`<ul><li><strong>Angioedema</strong> (allergic, ACE-inhibitor induced, or hereditary)</li><li><strong>Anaphylaxis</strong></li><li><strong>Sublingual/lingual haematoma</strong></li><li><strong>Sublingual or submandibular infection</strong> (Ludwig's angina)</li></ul>`},
      {q:"(b) List 4 causes of angioedema. (4 marks)",
       a:`<ul><li><strong>Idiopathic</strong> — most common cause in adults</li><li><strong>Allergic</strong> — IgE-mediated; rapid onset; usually with urticaria and other anaphylaxis features</li><li><strong>ACE-inhibitor induced</strong> — bradykinin-mediated; can occur years after starting; no urticaria; does not respond to adrenaline/antihistamines</li><li><strong>Hereditary (C1-esterase inhibitor deficiency)</strong> — bradykinin-mediated; family history; recurrent episodes; no urticaria</li></ul>`},
      {q:"(c) Which type does NOT respond to adrenaline and antihistamines? (1 mark)",
       a:`<p><strong>C1-esterase inhibitor deficiency (hereditary angioedema)</strong> — bradykinin-mediated; adrenaline and antihistamines are ineffective</p>`},
      {q:"(d) List treatments for hereditary angioedema. (3 marks)",
       a:`<ul><li><strong>Icatibant</strong> (bradykinin B2 receptor antagonist) — 30mg (3ml) SC</li><li><strong>C1-esterase inhibitor concentrate</strong> — IV 20 units/kg (500–1000 units)</li><li><strong>Fresh frozen plasma (FFP)</strong> — 1–2 units IV; contains C1-inhibitor; use if specific agents unavailable</li><li>Adrenaline 0.3–0.5mg IM — limited benefit but worth trying in extremis</li></ul>`},
      {q:"(e) Outline your airway management approach. (3 marks)",
       a:`<ul><li><strong>Awake fibre-optic intubation</strong> or <strong>surgical cricothyroidotomy</strong> — preferred approaches given massive tongue swelling</li><li><strong>Upright positioning</strong> — maximises airway patency</li><li><strong>Ketamine or midazolam for sedation</strong> — use cautiously to maintain airway tone</li><li><em>RSI with muscle relaxants risks complete airway loss — potentially fatal. Blind nasotracheal intubation unlikely to succeed with stridor. Orotracheal intubation may be impossible.</em></li></ul>`}
    ]
  },

  {
    id:"sant_2020_1_q8",paper:"SA/NT 2020.1",qnum:"Q8",marks:14,
    topics:["Cardiovascular","Haematology"],
    subtopics:["Vascular Emergencies","Coagulopathy & Bleeding"],
    title:"Unilateral leg swelling — differentials (DVT vs Baker's cyst vs cellulitis), provoked vs unprovoked DVT risk factors",
    stem:"A patient presents with unilateral calf and leg swelling.",
    parts:[
      {q:"(a) List differential diagnoses for unilateral leg swelling. (4 marks)",
       a:`<ul><li><strong>DVT</strong></li><li><strong>Ruptured Baker's cyst</strong> — pseudothrombophlebitis; fluid tracking from knee</li><li><strong>Cellulitis</strong></li><li><strong>Muscle tear / haematoma</strong></li><li>Ruptured popliteal aneurysm; superficial thrombophlebitis; lymphoedema</li></ul>`},
      {q:"(b) List examination features that help differentiate DVT from cellulitis. (6 marks)",
       a:`<p><strong>DVT features (Wells criteria):</strong></p>
       <ul><li>Calf swelling &gt;3cm compared to other leg (measured 10cm below tibial tuberosity)</li><li>Collateral non-varicose superficial veins</li><li>Entire leg swollen</li><li>Localised tenderness along deep venous system</li><li>Pitting oedema confined to symptomatic leg</li></ul>
       <p><strong>Cellulitis features:</strong></p>
       <ul><li>Skin erythema; blanching; involvement of the foot</li><li>Fever; lymphangitis / regional lymphadenopathy</li><li>Shiny skin (early) or puckered/indurated skin (late)</li></ul>`},
      {q:"(c) What factors in the history help determine provoked vs unprovoked DVT? (4 marks)",
       a:`<p><strong>Provoked (in last 3 months):</strong></p>
       <ul><li>Surgery under general anaesthesia or caesarean section</li><li>Hospitalisation with acute illness</li><li>Confined to bed ≥3 days with acute illness (out of hospital)</li><li>Pregnancy or puerperium</li><li>Leg injury with reduced mobility ≥3 days</li><li>Current oestrogen therapy</li><li>Inflammatory bowel disease; active malignancy</li></ul>
       <p><strong>Unprovoked risk factors to ask about:</strong></p>
       <ul><li>Family history of VTE (suggests heritable thrombophilia — APC resistance, prothrombin mutation, Protein S/C deficiency)</li><li>Autoimmune conditions (especially SLE — antiphospholipid syndrome)</li><li>Hyperviscosity syndromes; smoking</li></ul>`}
    ]
  },

  {
    id:"sant_2020_1_q9",paper:"SA/NT 2020.1",qnum:"Q9",marks:14,
    topics:["Orthopaedics"],
    subtopics:["Hand & Wrist"],
    title:"Palmar wound with suspected deep space infection — examination findings, structures at risk, management",
    stem:"A patient presents with multiple irregular palmar lacerations, swelling and erythema over the palm and middle finger. The middle finger is less flexed than the others.",
    images:[{src:"images/SANT 20201_9_Hand.webp",caption:"Palmar wound — describe the findings"}],
    parts:[
      {q:"(a) Describe the relevant examination findings. (3 marks)",
       a:`<ul><li>Recent wound(s) in the palm — multiple irregular lacerations</li><li>Swelling and erythema over the palm and middle finger</li><li><strong>Middle finger resting in less flexion than adjacent fingers</strong> — suggests flexor tendon injury or deep space infection (Kanavel's signs: finger held in flexion, fusiform swelling, tenderness along tendon sheath, pain on passive extension)</li></ul>`},
      {q:"(b) List the important structures at risk. (3 marks)",
       a:`<ul><li><strong>Deep palmar space / flexor tendon sheath</strong> — tenosynovitis</li><li><strong>Digital nerves</strong> — sensory loss to finger</li><li><strong>Flexor tendons</strong> — both FDS (superficial, PIP flexion) and FDP (deep, DIP flexion)</li><li>Superficial palmar arch (arterial bleeding)</li></ul>`},
      {q:"(c) Outline your examination to assess structures at risk. (4 marks)",
       a:`<ul><li><strong>FDP (deep flexor tendon):</strong> Hold PIP joint extended, ask patient to flex DIP — tests FDP in isolation</li><li><strong>FDS (superficial flexor tendon):</strong> Hold all other fingers extended, ask patient to flex PIP of affected finger — tests FDS in isolation</li><li><strong>Sensory (digital nerve):</strong> Two-point discrimination or light touch on each side of fingertip</li><li><strong>Motor:</strong> Adductor pollicis (thumb adduction against resistance)</li><li>Assess arterial bleeding — pressure over superficial palmar arch; check capillary refill</li><li>Palpate/visualise for foreign body (glass)</li></ul>`},
      {q:"(d) Outline management. (4 marks)",
       a:`<ul><li><strong>Analgesia</strong> — oral (avoid nerve block until nerve damage assessed)</li><li><strong>Antibiotics</strong> — early broad-spectrum covering anaerobes and Gram positives (e.g. amoxicillin-clavulanate/Augmentin); IV if tenosynovitis suspected</li><li><strong>Urgent surgical referral</strong> for operative exploration — tenosynovitis is a surgical emergency; delay risks permanent tendon damage</li><li>Wound dressing and hand elevation</li><li>Check tetanus vaccination status</li></ul>`}
    ]
  },

  {
    id:"sant_2020_1_q10",paper:"SA/NT 2020.1",qnum:"Q10",marks:18,
    topics:["Metabolic & Endocrine"],
    subtopics:["Electrolyte Disorders"],
    title:"Normal anion gap metabolic acidosis — causes (USED CARP), investigations, appropriate fluid choice",
    stem:"A patient presents with normal anion gap metabolic acidosis (NAGMA). History includes diarrhoea and normal saline given at the referring hospital.",
    parts:[
      {q:"(a) What does the ABG show? (2 marks)",
       a:`<p><strong>Normal anion gap metabolic acidosis (NAGMA)</strong></p>
       <p><em>Anion gap = Na – (Cl + HCO₃) — normal ≤12 mEq/L. In NAGMA the gap is normal but bicarb is low, compensated by low pCO₂.</em></p>`},
      {q:"(b) Why is the anion gap normal despite metabolic acidosis? (2 marks)",
       a:`<ul><li><strong>GI bicarbonate losses from diarrhoea</strong> — replaced by Cl⁻ (hyperchloraemic acidosis), keeping anion gap normal</li><li><strong>Normal saline (0.9% NaCl)</strong> given at referring hospital — hyperchloraemic NAGMA from excess chloride load</li></ul>`},
      {q:"(c) List the causes of NAGMA (USED CARP mnemonic). (4 marks)",
       a:`<ul><li><strong>U</strong>reterostomy / urinary diversion</li><li><strong>S</strong>mall bowel fistula</li><li><strong>E</strong>xtra chloride (normal saline administration)</li><li><strong>D</strong>iarrhoea / GI losses</li><li><strong>C</strong>arbonic anhydrase inhibitors (acetazolamide)</li><li><strong>A</strong>drenal insufficiency</li><li><strong>R</strong>enal tubular acidosis (types 1, 2, 4)</li><li><strong>P</strong>ancreatic fistula</li></ul>`},
      {q:"(d) List relevant investigations with justification. (4 marks)",
       a:`<ul><li><strong>ECG + Mg, PO₄:</strong> Hypokalaemia changes (peaked P, flat T, U wave, prolonged QT); assess other electrolyte depletions needing replacement</li><li><strong>βhCG:</strong> Rule out hyperemesis gravidarum as cause</li><li><strong>Stool M/C/S:</strong> Prolonged diarrhoea — identify infective cause</li><li><strong>Urinalysis + urine electrolytes:</strong> Renal failure investigation; hyponatraemia cause; urine anion gap (UAG) to distinguish renal vs extrarenal cause of NAGMA</li><li>FBC, CRP — inflammatory markers; renal ultrasound for renal failure investigation</li></ul>`},
      {q:"(e) Outline appropriate fluid choice with justification. (4 marks)",
       a:`<ul><li><strong>Use Hartmann's (Plasmalyte) rather than 0.9% saline</strong> — normal saline worsens NAGMA through chloride load; balanced solutions avoid this</li><li><strong>Adequate volume</strong> — patient is dehydrated with likely pre-renal AKI; needs volume replacement</li><li><strong>Potassium replacement</strong> — hypokalaemia present; add KCl to IV fluids at safe dose (premixed bag or mini-bags); risk of dysrhythmias if not corrected</li></ul>`}
    ]
  },

  {
    id:"sant_2020_1_q11",paper:"SA/NT 2020.1",qnum:"Q11",marks:12,
    topics:["Toxicology","Paediatrics"],
    subtopics:["Overdose & Poisoning","Paediatric Emergencies"],
    title:"Dangerous paediatric ingestions — 1-pill-can-kill agents, sulphonylurea management",
    stem:"A child presents after ingesting a household medication.",
    parts:[
      {q:"(a) List 5 medication categories on the '1–2 pills can kill a child' list. (5 marks)",
       a:`<ul><li><strong>Hydrocarbons</strong> — e.g. eucalyptus oil</li><li><strong>Corrosives</strong> — sodium hydroxide, strong acids</li><li><strong>Naphthalene</strong> — one mothball</li><li><strong>Organophosphate/carbamate insecticides</strong></li><li><strong>Lead</strong> — fishing or curtain weights</li><li>Camphor — insect repellent; old-fashioned mothball alternative</li><li><strong>Sulphonylureas</strong> (diabetes medications) — one tablet can be fatal in a child</li><li>Opioids; calcium channel blockers; beta-blockers; TCAs; antiarrhythmics; iron</li></ul>`},
      {q:"(b) Why is a sulphonylurea ingestion particularly dangerous in a child? (2 marks)",
       a:`<ul><li>Recognised on the 1–2 pills can kill list — <strong>potentially fatal from a single tablet</strong></li><li><strong>Hypoglycaemia</strong> typically occurs within 8 hours but can be delayed up to 18 hours post-ingestion (especially modified-release preparations)</li></ul>`},
      {q:"(c) Outline your management of a child with suspected sulphonylurea ingestion. (5 marks)",
       a:`<ul><li><strong>Serial hourly BSL monitoring</strong></li><li><strong>Prepare for IV access</strong> — topical LA cream while monitoring</li><li><strong>Observe for signs of hypoglycaemia</strong> — sweating, abnormal behaviour, drowsiness</li><li><strong>If hypoglycaemia develops:</strong></li><li>Dextrose 10% — 5 ml/kg IV</li><li><strong>Octreotide</strong> 1 mcg/kg SC/IV then 1 mcg/kg/hr — blocks sulphonylurea-stimulated insulin release; prevents rebound hypoglycaemia</li><li><strong>Admit for minimum 18 hours</strong> of observation regardless of initial BSL</li><li><em>Note: Serum paracetamol levels not required for isolated sulphonylurea ingestion</em></li></ul>`}
    ]
  },

  {
    id:"sant_2020_1_q12",paper:"SA/NT 2020.1",qnum:"Q12",marks:12,
    topics:["Haematology","Critical Care & Procedures"],
    subtopics:["Coagulopathy & Bleeding","Critical Care"],
    title:"Massive transfusion — indications, biochemical targets, complications",
    stem:"A trauma patient requires massive transfusion protocol activation.",
    parts:[
      {q:"(a) What factors determine the need for massive transfusion? (4 marks)",
       a:`<ul><li><strong>Cause and rate of haemorrhage</strong> — mechanism, estimated blood loss</li><li><strong>Current physiological state</strong> — BP, HR, GCS, lactate, coagulopathy</li><li><strong>Mechanism of injury</strong> — guides anticipated ongoing losses</li><li><strong>Likely requirement for ongoing blood component support</strong> — e.g. ABC score, shock index</li></ul>`},
      {q:"(b) List the biochemical targets during massive transfusion. (4 marks)",
       a:`<ul><li>pH &gt;7.2</li><li>Base excess &lt;−6</li><li>Lactate &lt;4 mmol/L</li><li>Ionised calcium &gt;1.1 mmol/L</li><li>Platelets &gt;50 × 10⁹/L</li><li>PT/APTT &lt;1.5× normal; INR &lt;1.5</li><li>Fibrinogen &gt;1 g/L (aim &gt;2 in obstetric haemorrhage)</li></ul>`},
      {q:"(c) List complications of massive transfusion. (4 marks)",
       a:`<ul><li>Volume overload / over-transfusion</li><li>Hypothermia — from large volumes of cold products</li><li><strong>TRALI</strong> (transfusion-related acute lung injury)</li><li><strong>TACO</strong> (transfusion-associated circulatory overload)</li><li>Hypocalcaemia — citrate chelation</li><li>Metabolic alkalosis — citrate metabolism</li><li>Hyperkalaemia — stored pRBCs release K</li><li>Dilutional coagulopathy if not using balanced 1:1:1 approach</li></ul>`}
    ]
  },

  {

    title:"Clinical pathway development — stakeholders, development process, advantages and disadvantages",
    stem:"You are tasked with developing a clinical pathway for your Emergency Department.",

       a:`<p><strong>Micro (direct care team):</strong> ED medical and nursing staff, surgical RMOs/registrars, theatre staff, anaesthetics, community nursing, clerical staff, patients</p>
       <p><strong>Meso (departmental management):</strong> ED head of department, surgical HOD, nursing HOD, theatre management, head of anaesthetics, patient advocates</p>
       <p><strong>Macro (executive/system level):</strong> Director of Medical Services, Director of Nursing, CEO, COO, health network executives</p>`},
      {q:"(b) Outline the steps in developing and implementing a clinical pathway. (5 marks)",
       a:`<ul><li>Identify area for improvement</li><li>Gather information — current evidence, guidelines from other hospitals</li><li>Involve stakeholders early</li><li>Set timeframe and milestones</li><li>Develop draft pathway and circulate for comment; refine and revise</li><li>Implement with staff education campaign</li><li>Post-implementation evaluation — assess compliance and identify performance measures</li><li>Adjust guideline based on results; regularly review as evidence evolves</li></ul>`},

       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">

         <tr><td style="padding:6px 10px;border:1px solid #30363d">Applies current evidence in a practical way</td><td style="padding:6px 10px;border:1px solid #30363d">Can promote rigid "cookbook" thinking — doesn't account for clinical variation</td></tr>

         <tr><td style="padding:6px 10px;border:1px solid #30363d">Discourages non-evidence-based interventions</td><td style="padding:6px 10px;border:1px solid #30363d">Does not account for individual patient preferences</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d">Provides benchmark for QI activities</td><td style="padding:6px 10px;border:1px solid #30363d">May undermine physician autonomy; unfairly used in medico-legal context</td></tr>

  {
    id:"sant_2020_1_q14",paper:"SA/NT 2020.1",qnum:"Q14",marks:12,
    topics:["Critical Care & Procedures","Respiratory"],
    subtopics:["Airway Management","Mechanical Ventilation"],
    title:"Morbidly obese patient requiring intubation — pre-oxygenation strategies, post-intubation problems, ventilator settings",
    stem:"A morbidly obese patient requires emergency intubation.",
    parts:[
      {q:"(a) Describe your pre-oxygenation strategy. (4 marks)",
       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
         <tr style="background:rgba(255,255,255,0.08)"><th style="padding:6px 10px;border:1px solid #30363d">Method</th><th style="padding:6px 10px;border:1px solid #30363d">Rationale</th></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>Patient positioning — ramping, semi-recumbent</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Removes weight off chest/diaphragm; improves FRC and V/Q mismatch; achieves best intubating position (ear-to-sternal notch)</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>BVM with PEEP valve; 2-handed technique</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Improves seal and airway dynamics; recruits atelectatic alveoli</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>NIV / HFNC</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Recruits alveoli; treats type 2 respiratory failure; bridge to intubation; prolongs safe apnoea time</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>Apnoeic oxygenation</strong> (nasal prongs 15L/min during laryngoscopy)</td><td style="padding:6px 10px;border:1px solid #30363d">Maintains oxygenation and prolongs safe apnoea time; flushes anatomical dead space</td></tr>
       </table>`},
      {q:"(b) What problems can occur post-intubation in a morbidly obese patient? (4 marks)",
       a:`<ul><li><strong>ETT problems</strong> — obstruction, cuff leak, endobronchial intubation (short neck, difficult landmarks)</li><li><strong>Worsening of underlying disease</strong> — ongoing hypoxia from obesity hypoventilation, OSA, reduced FRC</li><li><strong>Unrecognised pneumothorax</strong></li><li><strong>Aspiration</strong> — increased risk due to elevated intra-abdominal pressure, reduced LOS tone, delayed gastric emptying</li></ul>`},
      {q:"(c) What ventilator settings would you use? (4 marks)",
       a:`<ul><li><strong>Tidal volume:</strong> 6 ml/kg of <em>ideal body weight</em> (not actual body weight) — lung-protective ventilation</li><li><strong>Respiratory rate:</strong> 10–16/min</li><li><strong>PEEP:</strong> Higher PEEP (8–12 cmH₂O) to recruit and maintain alveoli</li><li><strong>Plateau pressure:</strong> Aim &lt;30 cmH₂O</li><li><strong>FiO₂:</strong> Titrate to SpO₂ ≥94%; avoid prolonged high FiO₂</li></ul>`}
    ]
  },

  {
    id:"sant_2020_1_q15",paper:"SA/NT 2020.1",qnum:"Q15",marks:12,
    topics:["Critical Care & Procedures","Paediatrics"],
    subtopics:["ED Procedures","Paediatric Emergencies"],
    title:"Ketamine for procedural sedation — advantages, contraindications, airway complications and management",
    stem:"You are considering ketamine for procedural sedation in a paediatric patient.",
    parts:[
      {q:"(a) List advantages of ketamine over other sedation agents. (4 marks)",
       a:`<ul><li><strong>Rapid onset</strong></li><li><strong>Quicker recovery time</strong></li><li><strong>Ease of titration and repeat dosing</strong></li><li><strong>Less vomiting</strong> than other agents (e.g. propofol)</li><li>Maintains airway reflexes; bronchodilator; analgesic and amnestic; haemodynamically stable</li></ul>`},
      {q:"(b) List contraindications to ketamine procedural sedation. (4 marks)",
       a:`<ul><li>Age &lt;3 months</li><li>Current significant respiratory illness (asthma, active RTI)</li><li>Known difficult airway; previous airway surgery or congenital anomaly</li><li>Potential intraoral bleeding (e.g. tongue lacerations) — risk of laryngospasm</li><li>Procedures stimulating the posterior pharynx</li><li>Cardiovascular disease where increased HR is contraindicated — IHD, cardiac failure, hypertension, WPW</li><li>Acute globe injury or glaucoma</li><li>Porphyria; thyroid disease; bowel obstruction; psychosis</li></ul>`},
      {q:"(c) List signs of airway compromise during ketamine sedation. (2 marks)",
       a:`<ul><li>Stridor</li><li>Increasing work of breathing</li><li>Oxygen desaturation</li><li>Bradycardia</li><li>Vomiting</li><li>Loss of capnography waveform</li></ul>`},
      {q:"(d) How do you manage laryngospasm during ketamine sedation? (2 marks)",
       a:`<ul><li>Clear supraglottis — suction secretions/blood</li><li>100% oxygen; positive pressure BVM ventilation; jaw thrust</li><li>Deepen sedation — low-dose propofol IV</li><li>Suxamethonium — muscle relaxant to break spasm</li><li>Consider intubation; call anaesthetics if available</li></ul>`}
    ]
  },

  {
    id:"sant_2020_1_q17",paper:"SA/NT 2020.1",qnum:"Q17",marks:12,
    topics:["Trauma","Critical Care & Procedures"],
    subtopics:["Thoracic & Abdominal Trauma","Critical Care"],
    title:"Aeromedical transfer of intubated trauma patient — pre-transfer preparation and in-transit interventions",
    stem:"An intubated, haemodynamically compromised trauma patient requires aeromedical transfer to a tertiary trauma centre.",
    parts:[
      {q:"(a) What pre-transfer preparation is required? (3 marks)",
       a:`<ul><li><strong>Notification of receiving hospital</strong> — ED, ICU, surgeons, radiology — ensure team ready on arrival</li><li><strong>Documentation and copying of notes</strong> and relevant imaging</li><li><strong>Contact with NOK/family</strong> — inform of transfer and destination</li></ul>`},
      {q:"(b) List the interventions and their rationale during transfer. (9 marks)",
       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
         <tr style="background:rgba(255,255,255,0.08)"><th style="padding:6px 10px;border:1px solid #30363d">Intervention</th><th style="padding:6px 10px;border:1px solid #30363d">Rationale</th></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>Ventilator adjustments</strong> — reduce FiO₂ to target SpO₂ &gt;95%; reduce TV to 6ml/kg</td><td style="padding:6px 10px;border:1px solid #30363d">Avoid hypoxia; prevent barotrauma/volutrauma and oxygen radical lung injury</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>Bilateral intercostal catheters</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Needle decompression or PTX may exist bilaterally; positive pressure ventilation and altitude will convert any PTX to tension PTX</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>Improved vascular access</strong> — humeral IO ×2 (above pelvis), central line (SCV/IJV), or peripheral IV</td><td style="padding:6px 10px;border:1px solid #30363d">Pelvic injury — access above pelvis; reliable access for haemodynamic instability in transit</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>Arterial line</strong> — radial preferred</td><td style="padding:6px 10px;border:1px solid #30363d">Non-invasive BP unreliable in unstable patients; need beat-to-beat monitoring in transit</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>TXA 1g stat + 1g over 8hrs</strong> (if within 3hr window)</td><td style="padding:6px 10px;border:1px solid #30363d">CRASH-2 trial — reduces mortality in unstable bleeding trauma if given within 3 hours</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>Temperature management</strong> — remove clothes, fans, ice packs in axillae, cool IV fluids; aim normothermia</td><td style="padding:6px 10px;border:1px solid #30363d">Hyperthermia worsens TBI prognosis; hypothermia worsens coagulopathy and trauma mortality</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>Additional packed cells + noradrenaline if needed</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Optimise BP/perfusion; MAP &gt;65; CRT &lt;2; UO &gt;0.5 ml/kg/hr</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>Replace rigid collar with soft collar + head blocks</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Reduce raised ICP; prevent pressure areas; rigid collar increases ICP</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>Apply pelvic binder</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Reduce pelvic volume and improve haemodynamics from pelvic blood loss</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>ICP neuroprotection</strong> — 30° head up; tape not tie ETT; normocarbia; normothermia; avoid hypoxia</td><td style="padding:6px 10px;border:1px solid #30363d">Reduce secondary brain injury from raised ICP</td></tr>
       </table>`}
    ]
  },

  {
    id:"sant_2020_1_q18",paper:"SA/NT 2020.1",qnum:"Q18",marks:12,
    topics:["Respiratory","Critical Care & Procedures"],
    subtopics:["Mechanical Ventilation","Acute Breathlessness"],
    title:"Intubated asthmatic — CXR interpretation, management, ventilator settings",
    stem:"An intubated asthmatic patient has deteriorated. CXR, management, and ventilator settings are to be reviewed.",
    images:[{src:"images/SANT 20201_18_Chest.webp",caption:"CXR of intubated asthmatic — describe the findings (part a)"}],
    parts:[
      {q:"(a) Describe the key CXR findings. (4 marks)",
       a:`<ul><li><strong>ETT positioned above the carina</strong> — confirm correct depth</li><li><strong>NG tube below the diaphragm</strong></li><li><strong>Large pneumothorax / deep sulcus sign</strong></li><li>Rotation; deviated mediastinum; possible rib fractures (right-sided)</li></ul>`},
      {q:"(b) List immediate management priorities. (4 marks)",
       a:`<ul><li><strong>Salbutamol</strong> — via MDI in-line or nebulised through ventilator circuit</li><li><strong>IV inotropes</strong> if haemodynamically compromised (dynamic hyperinflation causing reduced venous return)</li><li><strong>Chest tube / finger thoracostomy</strong> for pneumothorax — tension PTX is rapidly fatal in PPV</li><li><strong>Sedation — ketamine</strong> — bronchodilator, analgesic, maintains haemodynamics</li></ul>`},
      {q:"(c) Outline your ventilator settings for intubated asthma. (4 marks)",
       a:`<ul><li><strong>Tidal volume:</strong> 6 ml/kg IBW</li><li><strong>Respiratory rate:</strong> 10/min (slow rate allows full exhalation)</li><li><strong>I:E ratio:</strong> 1:&gt;4 (prolonged expiratory time to prevent dynamic hyperinflation / breath stacking)</li><li><strong>PEEP:</strong> &lt;12 cmH₂O (low PEEP to avoid worsening hyperinflation)</li><li><strong>Plateau airway pressure:</strong> Aim &lt;30 cmH₂O</li></ul>
       <p><em>Accept "permissive hypercapnia" — prioritise preventing dynamic hyperinflation over normalising CO₂</em></p>`}
    ]
  },

  {
    id:"sant_2020_1_q20",paper:"SA/NT 2020.1",qnum:"Q20",marks:12,
    topics:["Metabolic & Endocrine","Toxicology"],
    subtopics:["Other Endocrine","Overdose & Poisoning"],
    title:"SGLT-2 inhibitor euglycaemic ketoacidosis — differentials, diagnosis, management considerations",
    stem:"A diabetic patient on an SGLT-2 inhibitor presents with altered consciousness, high anion gap metabolic acidosis, and a normal or near-normal blood glucose.",
    parts:[
      {q:"(a) List the differential diagnoses for high anion gap metabolic acidosis with altered consciousness. (3 marks)",
       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
         <tr style="background:rgba(255,255,255,0.08)"><th style="padding:6px 10px;border:1px solid #30363d">Differential</th><th style="padding:6px 10px;border:1px solid #30363d">How to differentiate</th></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d">Toxicological causes (methanol, ethylene glycol, salicylate)</td><td style="padding:6px 10px;border:1px solid #30363d">Collateral history; witnessed ingestion; specific drug levels</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d">Ketoacidosis (DKA, starvation, alcoholic)</td><td style="padding:6px 10px;border:1px solid #30363d">Urinary and/or serum ketones</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d">Renal failure / uraemia</td><td style="padding:6px 10px;border:1px solid #30363d">Renal function tests — elevated urea confirming azotaemia</td></tr>
       </table>`},
      {q:"(b) What is the most likely diagnosis? (1 mark)",
       a:`<p><strong>Euglycaemic ketoacidosis secondary to SGLT-2 inhibitors</strong> (e.g. empagliflozin, dapagliflozin, canagliflozin)</p>
       <p><em>SGLT-2 inhibitors increase urinary glucose excretion → promotes ketone production; lowers BSL masking the expected hyperglycaemia of DKA → euglycaemic DKA (BSL often &lt;11 mmol/L). Key clue: diabetic on SGLT-2 inhibitor + HAGMA + ketones + normal/near-normal BSL.</em></p>`},
      {q:"(c) What specific management considerations apply in this patient? (4 marks)",
       a:`<ul><li><strong>Starvation and alcohol</strong> increase probability and severity of SGLT-2 inhibitor-induced euglycaemic DKA</li><li><strong>Altered GCS</strong> may be from post-ictal state, alcohol withdrawal, acute intoxication, or sepsis</li><li><strong>Thiamine before dextrose</strong> — nutritionally deplete patient; prevent Wernicke's encephalopathy</li><li><strong>Correct hypokalaemia before insulin</strong> — insulin drives K into cells; severe hypokalaemia risks dysrhythmia</li><li><strong>Sepsis trigger</strong> — alcohol dependence increases risk of aspiration and infection; investigate and treat</li><li>Standard DKA treatment: IV fluids, insulin infusion, close electrolyte monitoring; hold SGLT-2 inhibitor</li></ul>`}
    ]
  },

  {
    id:"sant_2020_1_q21",paper:"SA/NT 2020.1",qnum:"Q21",marks:12,
    topics:["Ophthalmology"],
    subtopics:["Ocular Emergencies"],

// ─── ALL TOPICS ──────────────────────────────────────────────────────────────
const ALL_TOPICS = [...new Set(QUESTIONS.flatMap(q => q.topics))].sort();
const ALL_PAPERS = [...new Set(QUESTIONS.map(q => q.paper))].sort();

// ─── STATE ───────────────────────────────────────────────────────────────────
let activeTopics = new Set();
let activePaper = '';
let activeSort = 'default';
let revealedAnswers = new Set();
let openCards = new Set();

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function highlight(text, q){
  if(!q) return esc(text);
  const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(text).replace(re,'<mark>$1</mark>');
}
function updateProgress(){
  const total = QUESTIONS.length;
  const done = revealedAnswers.size;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('prog-label').textContent = `${done} / ${total} answered`;
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function getFiltered(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  let list = QUESTIONS.filter(item => {
    if(activePaper && item.paper !== activePaper) return false;
    if(activeTopics.size > 0 && !item.topics.some(t => activeTopics.has(t))) return false;
    if(!q) return true;
    return item.title.toLowerCase().includes(q)
      || item.topics.join(' ').toLowerCase().includes(q)
      || item.subtopics.join(' ').toLowerCase().includes(q)
      || item.stem.toLowerCase().includes(q)
      || item.paper.toLowerCase().includes(q)
      || item.qnum.toLowerCase().includes(q)
      || item.parts.some(p => p.q.toLowerCase().includes(q));
  });
  if(activeSort === 'topic') list = [...list].sort((a,b)=>a.topics[0].localeCompare(b.topics[0]));
  if(activeSort === 'marks') list = [...list].sort((a,b)=>b.marks-a.marks);
  return list;
}

function renderChips(){
  const chips = document.getElementById('topic-chips');
  chips.innerHTML = `<div class="filter-chip${activeTopics.size===0?' all-active':''}" onclick="clearTopics()">All Topics</div>`
    + ALL_TOPICS.map(t => `<div class="filter-chip${activeTopics.has(t)?' active':''}" onclick="toggleTopic('${esc(t)}')">${esc(t)}</div>`).join('');
}

function renderPaperSelect(){
  const sel = document.getElementById('paper-filter');
  sel.innerHTML = '<option value="">All Papers</option>'
    + ALL_PAPERS.map(p => `<option value="${esc(p)}"${activePaper===p?' selected':''}>${esc(p)}</option>`).join('');
}

function renderCards(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const filtered = getFiltered();
  const info = document.getElementById('result-info');
  if(q || activeTopics.size>0 || activePaper){
    info.innerHTML = `<strong>${filtered.length}</strong> of ${QUESTIONS.length} questions`;
  } else {
    info.innerHTML = `<strong>${QUESTIONS.length}</strong> questions — ${ALL_PAPERS.length} paper${ALL_PAPERS.length!==1?'s':''}`;
  }

  const container = document.getElementById('qlist');
  if(filtered.length===0){
    container.innerHTML = '<div class="empty">No questions match your search. Try a different term.</div>';
    return;
  }

  container.innerHTML = filtered.map(item => {
    const isOpen = openCards.has(item.id);
    const partsHtml = item.parts.map((part,pi) => {
      const rid = item.id+'_p'+pi;
      const revealed = revealedAnswers.has(rid);
      return `<div class="qpart">
        <div class="qpart-q">${highlight(part.q, q)}</div>
        <div class="ans-toggle${revealed?' revealed':''}" onclick="toggleAnswer('${rid}',this)">
          ${revealed ? '▼ Hide Answer' : '▶ Show Answer'}
        </div>
        <div class="ans-content${revealed?' show':''}" id="ans_${rid}">
          ${part.a}
        </div>
      </div>`;
    }).join('');

    return `<div class="qcard${isOpen?' open':''}" id="card_${item.id}">
      <div class="qcard-header" onclick="toggleCard('${item.id}')">
        <div class="qnum">${esc(item.qnum)}</div>
        <div class="qmeta">
          <div class="qtitle">${highlight(item.title, q)}</div>
          <div class="qtags">
            ${item.topics.map(t=>`<span class="qtag" style="background:rgba(31,111,235,.12);color:#79c0ff;border-color:rgba(31,111,235,.25)">${esc(t)}</span>`).join('')}
            <span class="qtag qtag-paper">${esc(item.paper)}</span>
            <span class="qtag qtag-marks">${item.marks} marks</span>
          </div>
        </div>
        <div class="qchev">▼</div>
      </div>
      <div class="qbody">
        <div class="qstem">
          <div class="qstem-label">Clinical Scenario</div>
          <p>${highlight(item.stem, q)}</p>
        </div>
        ${item.images && item.images.length ? `
        <div class="qimages">
          <div class="qimages-label">Prop Images</div>
          <div class="qimages-grid">
            ${item.images.map(img => `
              <div class="qimg-wrap" onclick="openLightbox('${img.src}','${(img.caption||'').replace(/'/g,"\\'")}')">
                <img src="${img.src}" alt="${img.caption||''}" loading="lazy">
                ${img.caption ? `<div class="qimg-caption">${img.caption}</div>` : ''}
              </div>`).join('')}
          </div>
        </div>` : ''}
        <div class="qparts">${partsHtml}</div>
      </div>
    </div>`;
  }).join('');
}

function render(){
  renderChips();
  renderCards();
  updateProgress();
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function toggleCard(id){
  if(openCards.has(id)) openCards.delete(id); else openCards.add(id);
  renderCards();
}
function toggleAnswer(rid, btn){
  if(revealedAnswers.has(rid)){
    revealedAnswers.delete(rid);
    btn.innerHTML = '▶ Show Answer';
    btn.classList.remove('revealed');
    document.getElementById('ans_'+rid).classList.remove('show');
  } else {
    revealedAnswers.add(rid);
    btn.innerHTML = '▼ Hide Answer';
    btn.classList.add('revealed');
    document.getElementById('ans_'+rid).classList.add('show');
  }
  updateProgress();
}
function toggleTopic(t){
  if(activeTopics.has(t)) activeTopics.delete(t); else activeTopics.add(t);
  render();
}
function clearTopics(){ activeTopics.clear(); render(); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', render);
document.getElementById('paper-filter').addEventListener('change', e=>{ activePaper=e.target.value; render(); });
document.getElementById('sort-select').addEventListener('change', e=>{ activeSort=e.target.value; render(); });

const total = QUESTIONS.reduce((a,q)=>a+q.parts.length,0);
document.getElementById('hstats').textContent = `${QUESTIONS.length} questions · ${total} parts · ${ALL_PAPERS.length} paper`;
renderPaperSelect();
render();
</script>

<!-- Lightbox -->
<div id="imgLightbox" onclick="closeLightbox()">
  <span class="lb-close" onclick="closeLightbox()">✕</span>
  <img id="lbImg" src="" alt="">
  <div id="lbCaption" class="lb-caption"></div>
</div>
<script>
function openLightbox(src, caption){
  document.getElementById('lbImg').src = src;
  document.getElementById('lbCaption').textContent = caption || '';
  document.getElementById('imgLightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('imgLightbox').classList.remove('open');
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLightbox(); });
</script>
