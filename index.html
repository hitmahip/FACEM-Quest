<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FACEM Question Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--bg4:#21262d;
  --border:#30363d;--border2:#21262d;
  --text:#e6edf3;--text2:#c9d1d9;--text3:#8b949e;--text4:#6e7681;
  --accent:#238636;--accent2:#1f6feb;
  --tag-bg:#1f2937;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}

/* HEADER */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:28px 24px 20px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1000px;margin:0 auto}
.header-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-family:'Bitter',Georgia,serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.3px}
.logo span{color:#238636}
.header-stats{font-size:11px;color:var(--text3);margin-left:auto;font-family:'DM Mono',monospace}

/* CONTROLS */
.controls{max-width:1000px;margin:20px auto 0;padding:0 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;min-width:200px}
#search{width:100%;padding:9px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:inherit;transition:border-color .2s}
#search:focus{outline:none;border-color:var(--accent2)}
#search::placeholder{color:var(--text4)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;max-width:1000px;margin:12px auto 0;padding:0 24px}
.filter-chip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .15s;user-select:none;white-space:nowrap}
.filter-chip:hover{border-color:var(--text3)}
.filter-chip.active{background:var(--accent2);border-color:var(--accent2);color:#fff}
.filter-chip.all-active{background:#238636;border-color:#238636;color:#fff}
select{padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer}
select:focus{outline:none;border-color:var(--accent2)}

/* MAIN */
main{max-width:1000px;margin:0 auto;padding:20px 24px 60px}
#result-info{font-size:12px;color:var(--text3);margin-bottom:16px;min-height:18px;font-family:'DM Mono',monospace}
#result-info strong{color:var(--text2)}

/* QUESTION CARDS */
.qcard{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.qcard:hover{border-color:#444c56}
.qcard-header{padding:14px 18px;cursor:pointer;display:flex;align-items:flex-start;gap:14px;user-select:none}
.qcard-header:hover{background:rgba(255,255,255,0.02)}
.qnum{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:#fff;background:var(--accent2);border-radius:4px;padding:2px 8px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.qmeta{flex:1}
.qtitle{font-weight:600;font-size:14px;color:var(--text);line-height:1.4;margin-bottom:6px}
.qtags{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.qtag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;border:1px solid transparent}
.qtag-paper{background:rgba(31,111,235,.15);color:#79c0ff;border-color:rgba(31,111,235,.3)}
.qtag-marks{background:rgba(35,134,54,.15);color:#56d364;border-color:rgba(35,134,54,.3);font-family:'DM Mono',monospace}
.qchev{color:var(--text4);font-size:12px;flex-shrink:0;margin-top:4px;transition:transform .2s}
.qcard.open .qchev{transform:rotate(180deg)}

/* QUESTION BODY */
.qbody{display:none;border-top:1px solid var(--border2)}
.qcard.open .qbody{display:block}
.qstem{padding:16px 18px;background:var(--bg3);border-bottom:1px solid var(--border2)}
.qstem-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.qstem p{color:var(--text2);font-size:13px;line-height:1.7;margin-bottom:6px}
.qstem p:last-child{margin-bottom:0}
.qimages{padding:14px 18px 4px;border-bottom:1px solid var(--border2)}
.qimages-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.qimages-grid{display:flex;flex-wrap:wrap;gap:10px}
.qimg-wrap{position:relative;flex:1 1 180px;max-width:320px;cursor:pointer}
.qimg-wrap img{width:100%;border-radius:6px;border:1px solid var(--border);display:block;transition:border-color .15s}
.qimg-wrap:hover img{border-color:#58a6ff}
.qimg-caption{font-size:11px;color:var(--text3);margin-top:5px;text-align:center}
/* Lightbox */
#imgLightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#imgLightbox.open{display:flex}
#imgLightbox img{max-width:92vw;max-height:80vh;border-radius:8px;border:1px solid var(--border);object-fit:contain}
#imgLightbox .lb-caption{color:#c9d1d9;font-size:13px}
#imgLightbox .lb-close{position:absolute;top:18px;right:22px;font-size:28px;color:#8b949e;cursor:pointer;line-height:1}
#imgLightbox .lb-close:hover{color:#fff}

.qparts{padding:16px 18px}
.qpart{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border2)}
.qpart:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.qpart-q{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;padding:8px 12px;background:var(--bg4);border-left:3px solid var(--accent2);border-radius:0 4px 4px 0}
.qpart-marks{font-size:10px;color:var(--text3);margin-left:6px;font-family:'DM Mono',monospace}

/* ANSWER REVEAL */
.ans-toggle{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(35,134,54,.12);border:1px solid rgba(35,134,54,.3);border-radius:5px;font-size:11px;font-weight:600;color:#56d364;cursor:pointer;user-select:none;transition:all .15s;margin-bottom:10px}
.ans-toggle:hover{background:rgba(35,134,54,.2)}
.ans-toggle.revealed{background:rgba(35,134,54,.2);border-color:#238636}
.ans-content{display:none;background:rgba(35,134,54,.06);border:1px solid rgba(35,134,54,.2);border-radius:6px;padding:12px 14px}
.ans-content.show{display:block}
.ans-content p,.ans-content li{font-size:13px;color:var(--text2);line-height:1.7}
.ans-content ul,.ans-content ol{padding-left:18px;margin-top:4px}
.ans-content li{margin-bottom:4px}
.ans-content strong{color:var(--text);font-weight:600}

/* EMPTY */
.empty{text-align:center;padding:60px 0;color:var(--text4);font-size:15px}

/* PROGRESS BAR */
.progress-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:14px;font-size:11px;color:var(--text3);z-index:100}
.prog-inner{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#238636,#2ea043);border-radius:2px;transition:width .3s}
.prog-text{font-family:'DM Mono',monospace;white-space:nowrap}

mark{background:rgba(31,111,235,.3);color:#a5d6ff;border-radius:2px;padding:0 2px}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-row">
      <div class="logo">FACEM <span>Question Bank</span></div>
      <div class="header-stats" id="hstats"></div>
    </div>
  </div>
</header>

<div style="max-width:1000px;margin:16px auto 0;padding:0 24px">
  <div class="controls" style="padding:0;margin:0">
    <div class="search-wrap">
      <input id="search" type="search" placeholder="Search questions, topics, keywords…" autocomplete="off" spellcheck="false">
    </div>
    <select id="paper-filter">
      <option value="">All Papers</option>
    </select>
    <select id="sort-select">
      <option value="default">Sort: Default</option>
      <option value="topic">Sort: Topic A–Z</option>
      <option value="marks">Sort: Most Marks</option>
    </select>
  </div>
  <div class="filter-row" id="topic-chips"></div>
  <div style="margin-top:12px;font-size:11px;color:var(--text4)">
    💡 Click a question to expand · Click <span style="color:#56d364">Show Answer</span> to reveal · Use Ctrl+F or the search bar to find topics
  </div>
</div>

<main>
  <div id="result-info"></div>
  <div id="qlist"></div>
</main>

<div class="progress-bar">
  <span class="prog-text" id="prog-label">0 / 0 answered</span>
  <div class="prog-inner"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <span class="prog-text" id="prog-pct">0%</span>
</div>

<script>
// ─── QUESTION DATA ──────────────────────────────────────────────────────────
const QUESTIONS = [
  {
    id: "tamworth_2015_1_q1",
    paper: "Tamworth 2015.1",
    qnum: "Q1",
    marks: 10,
    topics: ["Cardiovascular"],
    subtopics: ["Acute Coronary Syndrome", "Pericarditis"],
    title: "Chest pain with back radiation — ECG interpretation, differential diagnosis",
    stem: "A 36 year old man presents to the ED complaining of 3 hours of gradual onset central chest discomfort. The pain is heavy, worse on deep inspiration and radiates to his back. He is a smoker, denies the use of recreational drugs and has no other significant past medical history. His father had an MI at age 62 years. An ECG is performed showing diffuse ST elevation.",
    images: [
      { src: "images/tamworth_2015_1_q1_ecg.jpg", caption: "12-lead ECG — describe and interpret" }
    ],
    parts: [
      {
        q: "(a) List your two most likely differential diagnoses. (2 marks)",
        a: `<ul><li><strong>Pericarditis</strong> — diffuse ST elevation, pleuritic component, young patient</li><li><strong>Acute MI</strong> — risk factors present (smoker, family history)</li><li><em>Also acceptable:</em> Pulmonary Embolism, Aortic Dissection</li></ul>`
      },
      {
        q: "(b) List 3 investigations that could be performed to differentiate between these diagnoses, with justifications. (6 marks)",
        a: `<ul>
          <li><strong>Clinical exam:</strong> Fever → pericarditis more likely; pericardial rub → pericarditis; unequal BP in arms, AR murmur, focal neurology → dissection; tachypnoea, hypoxia, calf swelling → PE</li>
          <li><strong>ECG serial:</strong> Saddle-shaped ST elevation in pericarditis vs territory-specific in MI; reciprocal changes in MI</li>
          <li><strong>Troponin/CK:</strong> Elevated in MI; may be mildly elevated in pericarditis</li>
          <li><strong>CT Aorta:</strong> If dissection suspected — intimal flap, false lumen</li>
          <li><strong>Echo:</strong> Pericardial effusion, wall motion abnormality in MI, tamponade signs</li>
          <li><strong>CTPA:</strong> If PE suspected — filling defects</li>
        </ul>`
      },
      {
        q: "(c) Name 2 treatment interventions for one of the possible diagnoses. (2 marks)",
        a: `<ul>
          <li><strong>Pericarditis:</strong> NSAIDs (aspirin/ibuprofen), colchicine; drain tamponade if present</li>
          <li><strong>Acute MI:</strong> Aspirin, clopidogrel, enoxaparin, GTN, primary PCI</li>
          <li><strong>PE:</strong> Enoxaparin, oxygen; thrombolysis if haemodynamically unstable</li>
          <li><strong>Dissection:</strong> Aggressive BP reduction, beta-blockade, analgesia, urgent surgical consult</li>
        </ul>`
      }
    ]
  },
  {
    id: "tamworth_2015_1_q2",
    paper: "Tamworth 2015.1",
    qnum: "Q2",
    marks: 10,
    topics: ["Obstetrics & Gynaecology", "Resuscitation"],
    subtopics: ["Obstetric Emergencies", "Cardiac Arrest / CPR", "Airway Management"],
    title: "Maternal cardiac arrest at 30 weeks — causes, airway, perimortem C-section",
    stem: "A 35 year old woman who is 30 weeks gestation is brought to your emergency department after a witnessed cardiac arrest.",
    parts: [
      {
        q: "(a) What are 4 leading causes of maternal death in pregnancy? (2 marks)",
        a: `<ul>
          <li>Trauma (homicide, MVA, suicide)</li>
          <li>Pulmonary embolism (thromboembolism)</li>
          <li>Haemorrhage (placental abruption, placenta praevia)</li>
          <li>Maternal cardiac disease (AMI, peripartum cardiomyopathy, dysrhythmia)</li>
          <li>Sepsis</li>
          <li>Pre-eclampsia / eclampsia</li>
        </ul>`
      },
      {
        q: "(b) List 4 airway and ventilation issues that may occur as a result of pregnancy. (4 marks)",
        a: `<ul>
          <li><strong>Increased aspiration risk</strong> — decreased lower oesophageal sphincter tone, increased abdominal pressure, decreased gastric emptying</li>
          <li><strong>Oedematous airways</strong> — tongue and supraglottic structures oedematous and friable (may bleed/swell; use smaller ETT)</li>
          <li><strong>Decreased FRC + increased O₂ consumption</strong> — hypoxia develops more quickly; less tolerant of apnoea</li>
          <li><strong>Difficult mask ventilation</strong> — elevated diaphragms, raised intra-abdominal pressure, low FRC</li>
          <li><strong>Difficult laryngoscopy</strong> — large breasts, obesity common, shorter neck, more anterior larynx</li>
          <li>Avoid significant respiratory alkalosis — decreases uterine blood flow</li>
        </ul>`
      },
      {
        q: "(c) What are the indications for a perimortem caesarean section? (2 marks)",
        a: `<ul>
          <li>Maternal cardiac arrest with gestational age <strong>&gt;24 weeks</strong></li>
          <li>Should be performed <strong>within 4–5 minutes</strong> of arrest (aim for delivery by 5 min); up to 20 minutes — neurological outcomes worsen after 5 minutes</li>
          <li>Benefits maternal outcome also — relieves aortocaval compression, decreases abdominal pressure, improves CPR effectiveness</li>
          <li>CPR continues during and after the procedure</li>
          <li>Consent is NOT required in a cardiac arrest</li>
        </ul>`
      }
    ]
  },
  {
    id: "tamworth_2015_1_q3",
    paper: "Tamworth 2015.1",
    qnum: "Q3",
    marks: 10,
    topics: ["Metabolic & Endocrine"],
    subtopics: ["Other Endocrine", "Thyroid Storm"],
    title: "Agitated woman, HR 150, temp 38.1 — thyroid storm diagnosis and management",
    stem: "A 45 year old woman presents to the Emergency Department in an agitated state. Examination reveals HR 150 bpm, BP 105/45, temperature 38.1°C and RR 28/minute. She has exophthalmos on examination. There is no evidence of focal neurological findings.",
    parts: [
      {
        q: "(a) What is the most likely diagnosis? (1 mark)",
        a: `<p><strong>Thyroid storm</strong> (thyrotoxic crisis) in the context of Graves' disease — exophthalmos is the key clinical clue.</p>`
      },
      {
        q: "(b) List 4 other important differentials you would consider. (4 marks)",
        a: `<ul>
          <li>Toxicological — amphetamines, cocaine, anticholinergic delirium, serotonin syndrome</li>
          <li>Sepsis — including pneumonia with hypoxia, intracranial sepsis (encephalitis/meningitis)</li>
          <li>Environmental hyperthermia / heat stroke</li>
          <li>Neuroleptic malignant syndrome (NMS)</li>
          <li>DKA with sepsis</li>
          <li>Phaeochromocytoma</li>
        </ul>`
      },
      {
        q: "(c) Outline 4 high priority emergency management interventions assuming thyroid storm. (4 marks)",
        a: `<p><em>Untreated mortality approaches 90%, primarily from cardiovascular collapse.</em></p>
        <ol>
          <li><strong>Block peripheral effects:</strong> Propranolol 0.5mg IV boluses up to 10mg; or Esmolol 250–500 mcg/kg bolus + 50–100 mcg/min infusion</li>
          <li><strong>Block thyroid hormone synthesis:</strong> Propylthiouracil (PTU) 900–1200mg loading dose via NG, then 200–300mg every 4–6 hours; Iodine (sodium iodide 1g IV 12-hourly); use lithium carbonate if iodine-allergic</li>
          <li><strong>General supportive care:</strong> ABCs; correct dehydration/electrolytes; treat hyperthermia (paracetamol — NOT aspirin as displaces T4); corticosteroids (hydrocortisone — reduces T4→T3 conversion)</li>
          <li><strong>Treat precipitating cause:</strong> Infection, trauma, surgery, thyroxine OD, recent radioiodine/iodinated contrast</li>
        </ol>`
      }
    ]
  },
  {
    id: "tamworth_2015_1_q4",
    paper: "Tamworth 2015.1",
    qnum: "Q4",
    marks: 10,
    topics: ["Critical Care & Procedures"],
    subtopics: ["Patient Safety & Ethics", "Evidence-Based Medicine"],
    title: "Quality improvement cycle, clinical indicators, value of QI in ED",
    stem: "You have been invited to join your Emergency Department's Quality Improvement Workgroup.",
    parts: [
      {
        q: "(a) List the key steps in the Quality Improvement Cycle. (4 marks)",
        a: `<ol>
          <li><strong>Plan</strong> — identify the problem, plan the change</li>
          <li><strong>Do</strong> — implement the change</li>
          <li><strong>Check</strong> — monitor, review and audit the change</li>
          <li><strong>Act</strong> — revise/review the plan and repeat the cycle (PDCA cycle)</li>
        </ol>`
      },
      {
        q: "(b) List 4 clinical indicators used in Emergency Medicine to measure clinical care and outcomes. (4 marks)",
        a: `<ul>
          <li>ATS (Australasian Triage Scale) compliance</li>
          <li>Access block / time to treatment rates</li>
          <li>STEMI — door-to-balloon / door-to-needle time</li>
          <li>NEAT (National Emergency Access Target) compliance</li>
          <li>Time to antibiotics (sepsis/meningitis)</li>
          <li>Time to analgesia</li>
          <li>Did Not Wait (DNW) rates</li>
          <li>Admission rates / unplanned re-presentations</li>
          <li>Missed results audit</li>
          <li>Patient satisfaction surveys</li>
          <li>Mortality in ED</li>
        </ul>`
      },
      {
        q: "(c) State 2 reasons why quality improvement is of value in the emergency department setting. (2 marks)",
        a: `<ul>
          <li>Identification of safety issues and deficits in patient care, enabling measures to improve outcomes and quality of care</li>
          <li>Comparison to peer centres to benchmark performance and identify areas needing improvement</li>
          <li>Promotes culture of accountability and continuous learning</li>
          <li>Supports regulatory compliance and accreditation requirements</li>
        </ul>`
      }
    ]
  },
  {
    id: "tamworth_2015_1_q5",
    paper: "Tamworth 2015.1",
    qnum: "Q5",
    marks: 10,
    topics: ["Paediatrics", "Resuscitation"],
    subtopics: ["Paediatric Emergencies", "Cardiac Arrest / CPR"],
    title: "Paediatric VF arrest — ETT medications, intraosseous access, IO complications",
    stem: "A 4 year old boy with a history of congenital heart disease is brought to your ED after suffering a VF arrest. Multiple DC shocks were unsuccessful. He remains in VF with CPR ongoing. He has been intubated but IV access cannot be obtained.",
    parts: [
      {
        q: "(a) List 3 medications which can be administered via the endotracheal route and the dose for each. (3 marks)",
        a: `<ul>
          <li><strong>Adrenaline</strong> — 100 mcg/kg ETT (10x the IV dose)</li>
          <li><strong>Atropine</strong> — 30 mcg/kg ETT</li>
          <li><strong>Lignocaine</strong> — 2–3 mg/kg ETT</li>
          <li><em>Mnemonic: NAVEL — Naloxone, Atropine, Vasopressin, Epinephrine, Lignocaine</em></li>
        </ul>`
      },
      {
        q: "(b) Outline the steps for gaining intraosseous access in a paediatric patient in an arrest scenario. (4 marks)",
        a: `<ol>
          <li>Select uninjured extremity — proximal tibial site preferred</li>
          <li>Position knee at 30 degrees flexion</li>
          <li>Identify anteromedial surface of upper tibia, 1–3 cm below the tubercle</li>
          <li>Insert EZ-IO drill at 90 degrees to bone, directed away from the growth plate</li>
          <li>Confirm placement: aspirate bone marrow, flush with normal saline (should flow freely)</li>
          <li>Commence fluid/medication infusion under pressure (must be syringed in)</li>
        </ol>
        <p><em>Other IO sites: distal femur, proximal humerus, distal tibia, sternum (adults)</em></p>`
      },
      {
        q: "(c) List 3 possible complications of intraosseous puncture. (3 marks)",
        a: `<ul>
          <li>Infection / osteomyelitis</li>
          <li>Through-and-through penetration of the bone</li>
          <li>Haematoma formation</li>
          <li>Pressure necrosis of overlying skin</li>
          <li>Subcutaneous infiltration / compartment syndrome</li>
          <li>Growth plate damage (minimised by directing needle away from physis)</li>
          <li>Fat embolism (rare)</li>
        </ul>`
      }
    ]
  },
  {
    id: "tamworth_2015_1_q6",
    paper: "Tamworth 2015.1",
    qnum: "Q6",
    marks: 10,
    topics: ["Trauma"],
    subtopics: ["Head Injury", "Airway Management"],
    title: "High-speed MVC with facial injuries — facial fractures, airway concerns",
    stem: "A 25 year old man sustains facial injuries in a high speed motor vehicle crash in which he was the unrestrained driver. He has bilateral periorbital bruising, facial swelling over the right zygoma, haemoserous nasal discharge and a swollen tongue.",
    parts: [
      {
        q: "(a) List 3 abnormal findings in the clinical picture. (3 marks)",
        a: `<ul>
          <li>Periorbital bruising bilaterally (raccoon eyes — suggests base of skull fracture)</li>
          <li>Facial swelling especially over the right zygoma</li>
          <li>Haemoserous nasal discharge (CSF rhinorrhoea — base of skull fracture)</li>
          <li>Swollen tongue / haematoma</li>
          <li>Chipped/fractured teeth</li>
        </ul>`
      },
      {
        q: "(b) What underlying injuries are of most concern? (3 marks)",
        a: `<ul>
          <li><strong>Base of skull fracture</strong> — bilateral periorbital haematoma (raccoon eyes), CSF rhinorrhoea</li>
          <li><strong>Intracranial haemorrhage</strong> — high-speed mechanism, head trauma</li>
          <li><strong>Facial bone fractures</strong> — mandibular, zygoma, Le Fort fractures</li>
          <li>C-spine injury (unrestrained high-speed mechanism)</li>
        </ul>`
      },
      {
        q: "(c) Outline 4 potential clinical concerns affecting management of this patient's airway. (4 marks)",
        a: `<ul>
          <li><strong>Swollen tongue / oropharyngeal haematoma</strong> — may obstruct view and access</li>
          <li><strong>Direct airway trauma</strong> — may distort anatomy</li>
          <li><strong>Depressed GCS</strong> from ICH — aspiration risk, reduced airway protection</li>
          <li><strong>Blood in airway</strong> from facial fractures — obscures view, risk of aspiration</li>
          <li><strong>Difficult intubation</strong> — mandibular fracture reduces mouth opening, small mouth opening</li>
          <li>Potential C-spine injury requiring in-line stabilisation</li>
        </ul>`
      }
    ]
  },
  {
    id: "tamworth_2015_1_q7",
    paper: "Tamworth 2015.1",
    qnum: "Q7",
    marks: 10,

          <li><strong>Drug/toxin:</strong> Methamphetamine, serotonin syndrome (paroxetine), NMS (haloperidol)</li>
          <li><strong>Heat stroke</strong> — hot day, hyperthermic, outdoors</li>
          <li><strong>CNS infection</strong> — meningitis/encephalitis</li>
          <li>Post-ictal state</li>
        </ul>`
      },
      {
        q: "What toxidromes may cause these symptoms? (4 marks)",
        a: `<ul>
          <li><strong>Serotonin syndrome</strong> — paroxetine (SSRI); rapid onset; clonus, hyperreflexia, diaphoresis</li>
          <li><strong>Neuroleptic Malignant Syndrome (NMS)</strong> — haloperidol; subacute onset; lead-pipe rigidity, Parkinsonian features</li>
          <li><strong>Sympathomimetic syndrome</strong> — methamphetamine; tachycardia, hypertension, diaphoresis, agitation</li>
          <li><strong>Anticholinergic syndrome</strong> — dry skin, urinary retention, dilated pupils, tachycardia</li>
        </ul>`
      },
      {
        q: "Single finding distinguishing benztropine (anticholinergic) from methamphetamine toxicity. (1 mark)",
        a: `<p><strong>Absence of sweating (anhidrosis)</strong> in benztropine. Methamphetamine causes diaphoresis; anticholinergics cause dry skin.</p>`

  {

  {
    id:"sant_2019_2_q2",paper:"SA/NT 2019.2",qnum:"Q2",marks:15,
    topics:["Respiratory","Infectious Disease / Sepsis"],
    subtopics:["Acute Breathlessness","Sepsis & Severe Infection"],
    title:"30yo IV drug user with haemoptysis and cavitating lung lesion — organisms, investigations, management",
    stem:"A 30-year-old male IV drug user presents with productive cough, fever, haemoptysis, and shortness of breath. Temp 38.6, RR 30, SpO2 91% RA, HR 140, BP 90/?. CXR shown.",
    parts:[
      {q:"(a) List 3 important CXR abnormalities. (3 marks)",
       a:`<ul><li><strong>Right mid-zone cavitating lesion</strong> — key finding</li><li>Right lower/middle lobe consolidation/pneumonia</li><li>Air bronchograms</li><li>Small right pleural effusion</li><li>Fluid in horizontal fissure</li></ul>`},
      {q:"(b) List 3 infectious organisms and 2 non-infectious causes producing a cavitating lesion. (5 marks)",
       a:`<p><strong>Infectious (need Staph aureus + one other for full marks):</strong></p>
       <ul><li><strong>Staphylococcus aureus</strong> — most common cause of cavitating pneumonia in IV drug users</li><li><strong>Mycobacterium tuberculosis</strong> — must consider in any cavitating lesion</li><li>Mycoplasma pneumoniae; Klebsiella; Pseudomonas; Anaerobes; Aspergillus; PJP; Echinococcus</li></ul>
       <p><strong>Non-infectious:</strong></p>
       <ul><li><strong>Malignancy</strong> — primary/metastatic/lymphoma</li><li>Pulmonary infarction/thromboembolic; Granulomas (RA, Wegener's, sarcoidosis); Congenital cyst</li></ul>`},
      {q:"(c) List 4 investigations with justification. (4 marks)",
       a:`<ul><li><strong>Sputum AFB (acid-fast bacilli) culture/antigen:</strong> Confirm/exclude TB — mandatory given cavitating lesion</li><li><strong>CT chest:</strong> Better characterise cavitation, identify smaller lesions, vascular abnormalities</li><li><strong>Echocardiogram:</strong> Identify infective endocarditis — IV drug user with bacteraemia</li><li><strong>Blood cultures:</strong> Identify organism, guide antibiotics, assess for bacteraemia/IE</li></ul>`},
      {q:"(d) Outline 3 most important initial treatments. (3 marks)",
       a:`<ul><li><strong>Broad-spectrum antibiotics with Staph aureus cover</strong> — e.g. vancomycin + piperacillin/tazobactam; isolate patient if TB suspected</li><li><strong>Oxygen</strong> — target SpO2 ≥94%</li><li><strong>IV fluid resuscitation</strong> — 15–30 ml/kg; noradrenaline if MAP remains &lt;65 despite fluids</li><li>Respiratory support if deteriorating; ICU/respiratory referral</li></ul>`}
    ]
  },

  {
    id:"sant_2019_2_q3",paper:"SA/NT 2019.2",qnum:"Q3",marks:12,
    topics:["Cardiovascular"],
    subtopics:["Acute Coronary Syndrome"],
    title:"Recurrent chest pain, inferior STEMI with possible posterior/RV involvement — ECG interpretation, investigations, medications",
    stem:"A 63-year-old male with recurrent chest pain now constant for 12 hours. History of gout, on allopurinol. Placed in resus with cardiac monitoring. ECG shown.",
    parts:[
      {q:"(a) Describe and interpret the ECG. (4 marks)",
       a:`<ul><li><strong>Inferior ST elevation</strong> — marginal for STEMI criteria; Q waves in inferior leads suggest infarction &gt;few hours old</li><li><strong>ST depression in V2 and/or aVL</strong> — may represent posterior or RV involvement (reciprocal changes)</li><li><strong>1mm STE in lateral leads</strong> — probable lateral extension</li><li><strong>Borderline upright T wave in V1</strong> — suggestive of ischaemia</li></ul>
       <p><em>Summary: Acute inferolateral MI with possible posterior and/or RV involvement.</em></p>`},
      {q:"(b) List 4 additional investigations and explain how each helps. (4 marks)",
       a:`<ul><li><strong>Serial troponins ± CK-MB:</strong> Pattern of elevation distinguishes acute vs recent MI</li><li><strong>Echocardiography:</strong> May show RV or posterior wall hypokinesis confirming extent of infarct</li><li><strong>Right-sided and posterior ECG leads (V3R–V6R, V7–V9):</strong> Identify RV infarction (V4R STE) or posterior infarction (ST elevation V7–V9)</li><li><strong>CXR:</strong> Pulmonary congestion or pleural effusions suggests significant myocardial dysfunction</li></ul>`},
      {q:"(c) List 4 medications with routes and doses. (4 marks)",
       a:`<ul><li><strong>Aspirin 300mg PO</strong> — antiplatelet; give immediately</li><li><strong>Second antiplatelet:</strong> Ticagrelor 180mg PO or Prasugrel 60mg PO or Clopidogrel 300mg PO</li><li><strong>Anticoagulation:</strong> Enoxaparin 1mg/kg SC BD or unfractionated heparin 60–70 units/kg IV bolus then 12–15 units/kg/hr (aPTT 1.5–2.5× control)</li><li><strong>GTN</strong> — sublingual or infusion, avoid hypotension; titrate to pain relief</li><li><strong>Opioid analgesia</strong> — morphine or fentanyl IV, titrated, if pain uncontrolled by above</li></ul>
       <p><em>Note: Allopurinol is not a contraindication. Caution with RV infarction — avoid nitrates and aggressive diuresis (preload-dependent).</em></p>`}
    ]
  },

  {

    title:"Hazmat MVC with multiple casualties — on-scene MCI management, METHANE, triage types, trapped patient",

      {q:"(b) Outline the METHANE disaster communication acronym. (7 marks)",
       a:`<ul><li><strong>M</strong> — My call sign / Major incident declared</li><li><strong>E</strong> — Exact location</li><li><strong>T</strong> — Type of incident with brief details</li><li><strong>H</strong> — Hazards present and potential</li><li><strong>A</strong> — Access routes</li><li><strong>N</strong> — approximate Number and Nature of casualties</li><li><strong>E</strong> — Emergency services present and required</li></ul>`},
      {q:"(c) What are the 2 types of on-scene triage and what does each determine? (4 marks)",

  {
    id:"sant_2019_2_q5",paper:"SA/NT 2019.2",qnum:"Q5",marks:12,
    topics:["Dermatology"],
    subtopics:["Skin & Soft Tissue"],
    title:"18yo with blistering mucocutaneous rash post-antibiotics — TEN/SJS differentials, causes, risk factors, treatments",
    stem:"An 18-year-old male with 2-week febrile illness treated with antibiotics develops a rapidly progressive painful blistering rash involving skin and mouth over 24 hours.",
    parts:[
      {q:"(a) List the 3 most important differential diagnoses. (3 marks)",
       a:`<ul><li><strong>Toxic Epidermal Necrolysis (TEN)</strong> — &gt;30% BSA detachment; highest mortality</li><li><strong>Stevens-Johnson Syndrome (SJS)</strong> — &lt;10% BSA; mucosal involvement typical</li><li><strong>Staphylococcal Scalded Skin Syndrome (SSSS)</strong> — staph toxin; more common in children but can occur in adults</li><li>Erythema multiforme; DRESS; Pemphigus/pemphigoid</li></ul>`},
      {q:"(b) List 4 of the most common causes. (4 marks)",
       a:`<p><strong>Medications (most common cause):</strong></p>
       <ul><li>Allopurinol — most common drug trigger in Asia</li><li>Anticonvulsants — carbamazepine, lamotrigine, phenytoin, phenobarbitone</li><li>Antibiotics — sulfonamides, beta-lactams</li><li>Nevirapine; NSAIDs (oxicams); Omeprazole; Dapsone</li></ul>
       <p><strong>Infections:</strong></p>
       <ul><li>Mycoplasma pneumoniae</li><li>Cytomegalovirus (CMV)</li></ul>`},
      {q:"(c) Name 2 risk factors for this disease. (2 marks)",
       a:`<ul><li>HIV/AIDS</li><li>Systemic lupus erythematosus (SLE)</li><li>Malignancies — lymphoma, leukaemia</li><li>Specific HLA alleles (e.g. HLA-B*58:01 and allopurinol in Asian populations)</li></ul>`},
      {q:"(d) List 3 important treatments irrespective of cause. (3 marks)",
       a:`<ul><li><strong>IV fluid and electrolyte management</strong> — manage as burn patient; calculate fluid requirements</li><li><strong>Barrier nursing / wound care</strong> — non-adhesive dressings, temperature-controlled environment</li><li><strong>Analgesia</strong> — significant pain; regular paracetamol + opioids</li><li>Temperature control; nutritional support; ophthalmology review for eye involvement</li><li>Withdraw causative agent immediately</li></ul>`}
    ]
  },

  {
    id:"sant_2019_2_q6",paper:"SA/NT 2019.2",qnum:"Q6",marks:12,
    topics:["Trauma","Neurology"],
    subtopics:["Head Injury","Spinal Injury","Thoracic & Abdominal Trauma"],
    title:"Intubated polytrauma — TBI, haemoperitoneum, pelvic fracture: life-threatening injuries, VBG, ventilation, ICP management",
    stem:"A 32-year-old male post high-speed motorbike crash. Scene GCS 13→7, intubated pre-hospital. Bilateral finger thoracostomies + 2u PRBC given. In resus: BP 110/60, HR 117, GCS E1VTM1, pupils 4mm equal reactive. FAST, CXR, PXR performed. Then right pupil becomes 7mm unreactive.",
    parts:[
      {q:"(a) List 3 life-threatening injuries and the basis for each diagnosis. (6 marks)",
       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
         <tr style="background:rgba(255,255,255,0.08)"><th style="padding:6px 10px;border:1px solid #30363d">Injury</th><th style="padding:6px 10px;border:1px solid #30363d">Basis for Diagnosis</th></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>Intra-abdominal injury with haemoperitoneum</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Strongly positive FAST — free fluid in Morrison's pouch; bruising to right flank</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>Traumatic brain injury with intracranial haemorrhage</strong></td><td style="padding:6px 10px;border:1px solid #30363d">GCS decline from 13 to 7; later right pupil blown (uncal herniation)</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>Major pelvic fracture with haemorrhage</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Displaced superior pubic ramus/acetabular + inferior pubic ramus fractures on PXR; pelvic binder in-situ</td></tr>
       </table>`},
      {q:"(b) Based on the VBG (ionised Ca 0.87), what medication and dose should you administer? (1 mark)",
       a:`<p><strong>Calcium chloride 10ml of 10% IV</strong> (or calcium gluconate 10ml of 10% IV) — ionised hypocalcaemia from massive transfusion, calcium chelation from citrate in blood products.</p>`},
      {q:"(c) What is your ventilation strategy? (2 marks)",
       a:`<p><strong>Increase ventilation to target ETCO₂ in the low 30s</strong> — the ETCO₂ of 47 with pCO₂ of 57 mmHg indicates significant dead space/gradient. In TBI, hypercarbia causes cerebral vasodilation and worsens raised ICP.</p>
       <p><em>Suggested settings: TV 560ml × 16 bpm (7ml/kg for 80kg patient). Aim ETCO₂ 30–35. Monitor gradient between ETCO₂ and ABG pCO₂ to guide further adjustments.</em></p>`},
      {q:"(d) What blood pressure goals and reasoning? (2 marks)",
       a:`<ul><li><strong>Target SBP &gt;100–110 mmHg or MAP &gt;80 mmHg</strong></li><li><strong>Reasoning:</strong> Hypotension causes secondary brain injury and dramatically increases mortality in TBI. This takes priority over permissive hypotension strategies used in haemorrhagic shock without TBI.</li></ul>`},
      {q:"(e) Right pupil now 7mm and unreactive — 1 treatment and dose. (1 mark)",
       a:`<ul><li><strong>Hypertonic saline 3% — 3 ml/kg IV</strong> (aim Na &lt;155 mmol/L); or <strong>mannitol 0.5–1 g/kg of 20% solution IV</strong></li><li>Both osmotic agents reduce cerebral oedema and ICP acutely — use as bridge to neurosurgical intervention</li></ul>`}
    ]
  },

  {
    id:"sant_2019_2_q7",paper:"SA/NT 2019.2",qnum:"Q7",marks:14,
    topics:["Haematology","Infectious Disease / Sepsis"],
    subtopics:["Oncological Emergencies","Sepsis & Severe Infection"],
    title:"16yo with fever, weight loss, cervical lymphadenopathy — lymphoma vs EBV: differentials, history, exam, investigations",
    stem:"A 16-year-old male with 6 days of fever, fatigue, weight loss, and a firm painless left lateral neck lump. HR 110, BP 108/62, Temp 39.2°C.",
    parts:[
      {q:"(a) List your 3 top differential diagnoses. (3 marks)",
       a:`<ul><li><strong>Hodgkin's or Non-Hodgkin's lymphoma</strong> — fever, weight loss, painless cervical lymphadenopathy = classic B symptoms</li><li><strong>EBV infection / infectious mononucleosis</strong> — most common cause of cervical lymphadenopathy in adolescents</li><li><strong>Bacterial tonsillitis / peritonsillar abscess</strong> — regional lymphadenopathy</li><li>Leukaemia; thyroid malignancy; TB</li></ul>`},
      {q:"(b) List 3 most important additional history features with explanation. (3 marks)",
       a:`<ul><li><strong>Night sweats</strong> — B symptom suggesting lymphoma</li><li><strong>Sore throat/dysphagia</strong> — suggests tonsillitis or oropharyngeal pathology</li><li><strong>Back/chest/abdominal pain or breathlessness</strong> — suggests generalised nodal involvement (mediastinal/abdominal nodes)</li><li>Easy bruising/bleeding — suggests leukaemia; TB exposure history; HIV risk factors</li></ul>`},
      {q:"(c) List 3 most important physical examination findings with explanation. (3 marks)",
       a:`<ul><li><strong>Other lymphadenopathy</strong> — axillary, inguinal, hepatosplenomegaly — suggests lymphoma or disseminated disease</li><li><strong>Size, consistency and mobility of the lump</strong> — large, firm, fixed/matted nodes are typically malignant vs softer mobile nodes in infection</li><li><strong>Features of anaemia or thrombocytopaenia</strong> — petechiae, purpura, pallor — suggests leukaemia</li><li>Signs of tonsillitis; thyroid examination; pleural effusion on auscultation</li></ul>`},
      {q:"(d) Describe 5 most helpful investigations with explanation. (5 marks)",
       a:`<ul><li><strong>FBC:</strong> May show anaemia, lymphocytosis (EBV/leukaemia), thrombocytopaenia (leukaemia), or normal (lymphoma early)</li><li><strong>CXR:</strong> Look for mediastinal widening (lymphoma), infection</li><li><strong>Core needle biopsy of neck mass:</strong> Definitive histological diagnosis of lymphoma vs reactive node</li><li><strong>Throat/blood cultures:</strong> Identify bacterial infection</li><li><strong>Viral serology:</strong> EBV, CMV, HIV serology</li><li>LDH — elevated in lymphoma; ESR/CRP; CT chest/abdomen for staging</li></ul>`}
    ]
  },

  {
    id:"sant_2019_2_q8",paper:"SA/NT 2019.2",qnum:"Q8",marks:14,
    topics:["Paediatrics","Respiratory"],
    subtopics:["Paediatric Emergencies","Acute Breathlessness"],
    title:"18-month-old with recurrent chest infections — pneumonia management, antibiotic doses, underlying causes, follow-up",
    stem:"An 18-month-old boy with several months of cough, multiple chest infections, and recurrent right-sided pneumonia. Temp 38.2, HR 120, RR 42, SpO2 95% RA. Currently well-appearing and playful. CXR: right middle lobe pneumonia.",
    parts:[
      {q:"(a) CXR interpretation. (1 mark)",
       a:`<p><strong>Right middle lobe pneumonia</strong></p>`},
      {q:"(b) Antibiotic choice, dose and frequency for mild pneumonia in an 18-month-old. (4 marks)",
       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
         <tr style="background:rgba(255,255,255,0.08)"><th style="padding:6px 10px;border:1px solid #30363d">Allergy status</th><th style="padding:6px 10px;border:1px solid #30363d">Antibiotic</th><th style="padding:6px 10px;border:1px solid #30363d">Dose and frequency</th></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d">No allergy</td><td style="padding:6px 10px;border:1px solid #30363d"><strong>Amoxycillin</strong></td><td style="padding:6px 10px;border:1px solid #30363d">25 mg/kg TDS</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d">Severe penicillin allergy</td><td style="padding:6px 10px;border:1px solid #30363d"><strong>Azithromycin</strong> or Clarithromycin</td><td style="padding:6px 10px;border:1px solid #30363d">Azithromycin 10 mg/kg daily; Clarithromycin 7.5 mg/kg BD</td></tr>
       </table>`},
      {q:"(c) Recommended duration of oral antibiotics in mild paediatric pneumonia. (1 mark)",
       a:`<p><strong>3–5 days</strong></p>`},
      {q:"(d) Give 4 possible explanations for this child's recurrent illnesses. (4 marks)",
       a:`<ul><li><strong>Recurrent bacterial pneumonia</strong> (same or different organisms)</li><li><strong>Inhaled foreign body</strong> — unwitnessed, causing post-obstructive pneumonia (note: breastfeeding ceased at 5 months when solids introduced)</li><li><strong>Cystic fibrosis</strong> — classic presentation; recurrent pulmonary infections from birth, wet productive cough</li><li><strong>Immune deficiency</strong> — primary immunodeficiency (IgA deficiency, agammaglobulinaemia)</li><li>Bronchiectasis; congenital airway anomaly</li></ul>`},
      {q:"(e) Preferred disposition with justification. (1 mark)",
       a:`<p><strong>Discharge home</strong> — child is well, playful, tolerating oral intake and does not meet admission criteria. However, requires urgent follow-up for recurrent infection workup. Admit if social concerns or distance from care.</p>`},
      {q:"(f) List 3 follow-up investigations to determine cause of recurrent infections. (3 marks)",
       a:`<ul><li><strong>Sweat test</strong> — cystic fibrosis</li><li><strong>Immunoglobulins / FBC</strong> — primary immune deficiency</li><li><strong>CT chest</strong> — bronchiectasis, congenital airway anomaly, foreign body</li><li>Bronchoscopy — foreign body, bronchomalacia; skin/throat cultures</li></ul>`}
    ]

  {
    id:"sant_2019_2_q9",paper:"SA/NT 2019.2",qnum:"Q9",marks:14,
    topics:["Orthopaedics","Paediatrics"],
    subtopics:["Fractures","Paediatric Emergencies"],
    title:"5yo lateral condyle fracture — X-ray findings, management, CRITOE ossification centres",
    stem:"A 5-year-old girl with a swollen, bruised left elbow after falling from monkey bars. Reluctant to flex. Neurovascularly intact. Elbow X-rays shown.",
    parts:[
      {q:"(a) Describe 5 important X-ray findings. (5 marks)",
       a:`<ul><li><strong>Lateral condylar fracture</strong> of distal humerus (not epicondyle) — key finding</li><li><strong>1–2mm displacement</strong> of fracture fragment</li><li><strong>Large anterior fat pad sign</strong> (sail sign)</li><li><strong>Large posterior fat pad sign</strong> — always abnormal, confirms haemarthrosis</li><li><strong>Prominent soft tissue swelling laterally</strong></li><li>Radiocapitellar line maintained; elbow joint located (no dislocation)</li></ul>`},
      {q:"(b) Outline specific management of this injury. (3 marks)",
       a:`<ul><li><strong>Undisplaced fractures (&lt;2mm):</strong> Above-elbow POP backslab (long arm cast) in ED → orthopaedic review + fracture clinic follow-up within 7–10 days. Both AP and oblique views taken after cast removal. These fractures are intra-articular and prone to non-union (bathed in synovial fluid) and displacement — require careful monitoring.</li><li><strong>Displaced fractures (&gt;2mm on any view):</strong> Urgent orthopaedic review; open reduction and internal fixation (K-wires) within 48 hours. Malunion is very difficult to treat; surgical fixation recommended for all displaced fractures.</li></ul>`},
      {q:"(c) Name the elbow ossification centres in order of appearance with age. (6 marks)",
       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
         <tr style="background:rgba(255,255,255,0.08)"><th style="padding:6px 10px;border:1px solid #30363d">Order</th><th style="padding:6px 10px;border:1px solid #30363d">Ossification Centre</th><th style="padding:6px 10px;border:1px solid #30363d">Age first visible</th></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d">1st</td><td style="padding:6px 10px;border:1px solid #30363d"><strong>Capitellum</strong></td><td style="padding:6px 10px;border:1px solid #30363d">1–2 years</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d">2nd</td><td style="padding:6px 10px;border:1px solid #30363d"><strong>Radial head</strong></td><td style="padding:6px 10px;border:1px solid #30363d">3–4 years</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d">3rd</td><td style="padding:6px 10px;border:1px solid #30363d"><strong>Internal (medial) epicondyle</strong></td><td style="padding:6px 10px;border:1px solid #30363d">5–6 years</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d">4th</td><td style="padding:6px 10px;border:1px solid #30363d"><strong>Trochlea</strong></td><td style="padding:6px 10px;border:1px solid #30363d">7–8 years</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d">5th</td><td style="padding:6px 10px;border:1px solid #30363d"><strong>Olecranon</strong></td><td style="padding:6px 10px;border:1px solid #30363d">9–10 years</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d">6th</td><td style="padding:6px 10px;border:1px solid #30363d"><strong>External (lateral) epicondyle</strong></td><td style="padding:6px 10px;border:1px solid #30363d">11–12 years</td></tr>
       </table>
       <p style="margin-top:8px;font-size:11px;color:#8b949e"><em>Mnemonic: CRITOE — Capitellum, Radial head, Internal epicondyle, Trochlea, Olecranon, External epicondyle</em></p>`}
    ]
  },

  {
    id:"sant_2019_2_q10",paper:"SA/NT 2019.2",qnum:"Q10",marks:18,
    topics:["Infectious Disease / Sepsis"],
    subtopics:["Sepsis & Severe Infection"],
    title:"Leg skin infection with NF features — clinical signs, ABG interpretation (HAGMA), management priorities",
    stem:"A 30-year-old male with skin infection to left lower leg. Penicillin allergy (throat swelling). Febrile but haemodynamically stable initially. You suspect necrotising fasciitis. He becomes hypotensive. ABG shown.",
    parts:[
      {q:"(a) 6 history and examination features suggesting necrotising fasciitis (besides fever). (6 marks)",
       a:`<p><strong>History:</strong></p>
       <ul><li><strong>Rapid progression of symptoms</strong> — worsening quickly over hours</li><li><strong>Severe pain out of proportion to skin findings</strong> — hallmark feature</li><li>Systemic symptoms — anorexia, nausea, dizziness, myalgia</li></ul>
       <p><strong>Examination:</strong></p>
       <ul><li><strong>Crepitus</strong> on palpation — gas-forming organisms</li><li><strong>Skin bullae</strong> — haemorrhagic or clear blisters</li><li>Cutaneous anaesthesia; skin discolouration, ecchymosis or necrosis; oedema extending beyond visible erythema</li></ul>`},
      {q:"(b) Explain the key ABG findings. (6 marks)",
       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
         <tr style="background:rgba(255,255,255,0.08)"><th style="padding:6px 10px;border:1px solid #30363d">Finding</th><th style="padding:6px 10px;border:1px solid #30363d">Likely Reason</th></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>pH normal/fully compensated</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Dual pathology — respiratory alkalosis balanced by metabolic acidosis</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>Low pCO₂ (respiratory alkalosis)</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Hyperventilation from pain/distress/circulating endotoxin; compensatory response to metabolic acidosis</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>High anion gap metabolic acidosis</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Early sepsis, poor tissue perfusion, lactic acidosis from hypoperfusion</td></tr>
       </table>`},
      {q:"(c) 3 most important management priorities with justification. (6 marks)",
       a:`<ol><li><strong>Urgent surgical referral for debridement:</strong> Source control is the only definitive treatment; delay dramatically increases mortality. No antibiotic will penetrate necrotic tissue.</li><li><strong>Broad-spectrum IV antibiotics (noting penicillin allergy):</strong> Meropenem 1g IV + Vancomycin 25–30mg/kg IV + Clindamycin 600mg IV — covers MRSA, anaerobes, Gram-negatives, and has toxin suppression (clindamycin). Alternatives: gentamicin + vancomycin + clindamycin.</li><li><strong>Fluid resuscitation:</strong> IV Hartmann's or NaCl 30 ml/kg; aim MAP ≥65; vasopressors (noradrenaline) if unresponsive. <em>Also acceptable: analgesia — IV morphine 2.5–10mg.</em></li></ol>`}
    ]
  },

  {
    id:"sant_2019_2_q12",paper:"SA/NT 2019.2",qnum:"Q12",marks:13,
    topics:["Cardiovascular"],
    subtopics:["Arrhythmias","Acute Coronary Syndrome"],
    title:"Syncope with deterioration — ECG features of arrhythmia, non-arrhythmic cardiogenic shock causes and management",
    stem:"A 64-year-old man with syncope. Initial ECG: no arrhythmia, heart block or ACS. Then deteriorates: HR 125 sinus, RR 32, SpO2 93%, BP 70/50, GCS 13.",
    parts:[
      {q:"(a) List 5 ECG features that would suggest arrhythmia as a cause of syncope. (5 marks)",
       a:`<ul><li><strong>Epsilon waves</strong> — arrhythmogenic right ventricular cardiomyopathy (ARVC) → VT</li><li><strong>Prolonged QT</strong> — Torsades de Pointes risk</li><li><strong>Short PR + delta waves (pre-excitation)</strong> — WPW → AF with rapid conduction</li><li><strong>RSR' + ST elevation in V1/V2</strong> (Brugada pattern) — VF risk</li><li><strong>Deep Q waves / T wave inversion</strong> — HOCM pattern</li><li>Severe hyper/hypokalaemia changes; Na channel blockade (wide QRS, right axis)</li></ul>`},
      {q:"(b) Non-arrhythmic causes of cardiogenic shock with specific management for each. (8 marks)",
       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
         <tr style="background:rgba(255,255,255,0.08)"><th style="padding:6px 10px;border:1px solid #30363d">Cause</th><th style="padding:6px 10px;border:1px solid #30363d">Management</th></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d">ACS / Massive MI</td><td style="padding:6px 10px;border:1px solid #30363d">Urgent revascularisation — primary PCI or thrombolysis; IABP</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d">Papillary muscle rupture (acute MR)</td><td style="padding:6px 10px;border:1px solid #30363d">Mechanical support devices; inotropes; urgent cardiac surgery</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d">Cardiac tamponade</td><td style="padding:6px 10px;border:1px solid #30363d">Pericardiocentesis / surgical drainage</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d">Takotsubo cardiomyopathy</td><td style="padding:6px 10px;border:1px solid #30363d">Inotropes; levosimendan; avoid catecholamines</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d">Ventricular rupture</td><td style="padding:6px 10px;border:1px solid #30363d">ECMO; mechanical assist devices; emergency surgery</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d">Beta-blocker/Ca channel blocker OD</td><td style="padding:6px 10px;border:1px solid #30363d">High-dose insulin/dextrose; glucagon; calcium; lipid emulsion; pacing</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d">Na channel blocking agents (TCA, flecainide)</td><td style="padding:6px 10px;border:1px solid #30363d">Sodium bicarbonate; hyperventilation to achieve alkalosis</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d">Acute myocarditis</td><td style="padding:6px 10px;border:1px solid #30363d">Supportive; mechanical assist; steroids if immune-mediated</td></tr>
       </table>`}
    ]
  },

  {
    id:"sant_2019_2_q13",paper:"SA/NT 2019.2",qnum:"Q13",marks:12,
    topics:["Toxicology","Neurology"],
    subtopics:["Overdose & Poisoning","Seizures"],
    title:"Seizure from prescription medication overdose — drug classes causing seizures, bedside tests, second-line agents",
    stem:"A 45-year-old man with a witnessed generalised seizure, suspected prescription drug overdose. Given 5mg IM midazolam pre-hospital. He then has 2 more seizures in ED despite IV midazolam.",
    parts:[
      {q:"(a) List 4 prescription medications under each drug category which could cause seizure in overdose. (4 marks)",
       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
         <tr style="background:rgba(255,255,255,0.08)"><th style="padding:6px 10px;border:1px solid #30363d">Drug Class</th><th style="padding:6px 10px;border:1px solid #30363d">Examples</th></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d">Analgesics</td><td style="padding:6px 10px;border:1px solid #30363d">Tramadol; lignocaine; propoxyphene; salicylates</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d">Antimicrobials</td><td style="padding:6px 10px;border:1px solid #30363d">Isoniazid (INH); chloroquine; quinine; metronidazole</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d">Psychiatric medications</td><td style="padding:6px 10px;border:1px solid #30363d">Bupropion; citalopram; lithium; venlafaxine; TCAs; antidopaminergics</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d">Other medications</td><td style="padding:6px 10px;border:1px solid #30363d">Hypoglycaemic agents; methylxanthines (theophylline); propranolol; baclofen</td></tr>
       </table>
       <p style="margin-top:8px;font-size:11px;color:#8b949e"><em>Note: Isoniazid causes seizures via pyridoxine depletion — treat with pyridoxine 5g IV empirically.</em></p>`},
      {q:"(b) List 3 immediate bedside tests with rationale. (6 marks)",
       a:`<ul><li><strong>BSL:</strong> Exclude hypoglycaemia as a reversible cause of seizure</li><li><strong>ECG:</strong> Features of Na-channel blockade (wide QRS, right axis, R wave in aVR); prolonged QT (risk of TdP)</li><li><strong>VBG:</strong> Hyponatraemia; metabolic acidosis pattern; specific agent clues (salicylate acidosis)</li></ul>`},
      {q:"(c) List 2 second-line agents (with doses) for refractory seizures. (2 marks)",
       a:`<ul><li><strong>Levetiracetam</strong> 1–3.5g IV over 15–60 minutes</li><li><strong>Sodium valproate</strong> 1–3g IV over 5–60 minutes</li><li><strong>Pyridoxine (Vitamin B6)</strong> 5g IV or 70mg/kg — especially if INH toxicity suspected</li><li>Phenobarbitone 5–15mg/kg IV over 15 minutes</li><li><em>Note: Phenytoin has no role in toxicological seizures.</em></li></ul>`}
    ]
  },

  {
    id:"sant_2019_2_q14",paper:"SA/NT 2019.2",qnum:"Q14",marks:13,
    topics:["Haematology"],
    subtopics:["Coagulopathy & Bleeding"],
    title:"Syncope with severe microcytic anaemia from NSAID use — transfusion complications and transfusion reaction management",
    stem:"A 42-year-old male with chronic knee pain (on NSAIDs) presents with syncope. CBE shows severe microcytic anaemia with raised reticulocyte count. Requires blood transfusion. During transfusion: temp 38°C, HR 110.",
    parts:[
      {q:"(a) What are the significant CBE findings? (2 marks)",
       a:`<ul><li><strong>Severe microcytic anaemia</strong> — low Hb, low RBC, low MCV, low PCV</li><li><strong>Raised reticulocyte count</strong> — bone marrow responding (acute blood loss)</li></ul>`},
      {q:"(b) Most likely diagnosis. (1 mark)",
       a:`<p><strong>Upper gastrointestinal haemorrhage</strong> — bleeding peptic ulcer from NSAID use</p>`},
      {q:"(c) List 5 potential complications of packed red blood cell transfusion. (5 marks)",
       a:`<ul><li><strong>Haemolytic reaction / ABO incompatibility</strong> — most serious; can be fatal</li><li><strong>Allergic/anaphylactic reaction</strong></li><li><strong>Transfusion-Related Acute Lung Injury (TRALI)</strong></li><li><strong>Transfusion-Associated Circulatory Overload (TACO)</strong> / fluid overload</li><li>Febrile non-haemolytic reaction</li><li>Transfusion-Transmitted Bacterial Infection (TTBI); viral infection (HIV, HBV, HCV); iron overload; hyperkalaemia</li></ul>`},
      {q:"(d) List 5 immediate actions for a suspected transfusion reaction. (5 marks)",
       a:`<ol><li><strong>Stop the transfusion immediately</strong></li><li>Disconnect bag and tubing — save for analysis</li><li>Maintain IV access — ensure adequate hydration with alternative fluid</li><li>Confirm correct product and patient ID match</li><li>Assess patient — check for signs of anaphylaxis, haemolysis, sepsis</li><li>Contact transfusion service — for further checks and follow-up testing</li><li>Take blood sample for transfusion service and haemolysis screen</li></ol>`}
    ]
  },

  {
    id:"sant_2019_2_q15",paper:"SA/NT 2019.2",qnum:"Q15",marks:11,
    topics:["Gastrointestinal"],
    subtopics:["Upper GI & Abdominal"],
    title:"85yo who pulled out PEG tube — resiting factors, alternatives, malposition, complications",
    stem:"A 75-year-old stroke patient from a nursing home who pulled out his PEG (gastrostomy) tube. No specialist gastroenterology or surgical support available on site.",
    parts:[
      {q:"(a) List 2 factors determining whether to re-site the tube and rationale. (4 marks)",
       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
         <tr style="background:rgba(255,255,255,0.08)"><th style="padding:6px 10px;border:1px solid #30363d">Factor</th><th style="padding:6px 10px;border:1px solid #30363d">Rationale</th></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>Time since original PEG placement</strong></td><td style="padding:6px 10px;border:1px solid #30363d">If &lt;4 weeks, gastrostomy tract may not be fully matured — risk of tube misplacement into peritoneal cavity. Should NOT be re-sited in ED without specialist guidance.</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>Time since PEG removal</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Should be replaced ASAP — tract begins closing within 24 hours (possibly sooner). Peritonitis or major bleeding are absolute contraindications to re-siting.</td></tr>
       </table>`},
      {q:"(b) What is a suitable alternative when a PEG tube is unavailable? (1 mark)",
       a:`<p><strong>Large bore Foley catheter</strong> — inserted through the stoma to maintain tract patency until PEG can be replaced</p>`},
      {q:"(c) You are concerned about tube malposition — next step and justification. (2 marks)",
       a:`<p><strong>Water-soluble contrast study via the tube + CT abdomen</strong> — confirms tube position relative to stomach/peritoneal cavity; identifies tube in peritoneal cavity before feeding commenced.</p>`},
      {q:"(d) List 4 other PEG complications presenting to ED. (4 marks)",
       a:`<ul><li>Wound infection, cellulitis, buried bumper syndrome, necrotising fasciitis</li><li>Bleeding — from stoma site or GI tract</li><li>Leakage around stoma / tube</li><li>Gastric contents into peritoneal cavity (peritonitis)</li><li>Gastric outlet obstruction; ileus/gastroparesis</li><li>PEG tube blockage; aspiration pneumonia; pneumoperitoneum</li></ul>`}
    ]
  },

  {
    id:"sant_2019_2_q16",paper:"SA/NT 2019.2",qnum:"Q16",marks:12,
    topics:["Environmental & Burns"],
    subtopics:["Environmental Emergencies"],
    title:"SCUBA diver with decompression illness — DCI risk factors, aeromedical retrieval pros and cons",
    stem:"A 39-year-old SCUBA diver 2 hours post-ascent from Great Barrier Reef dive. Rash on torso. Then develops leg weakness and urinary retention — spinal DCI. Needs retrieval 300km to hyperbaric chamber.",
    parts:[
      {q:"(a) State the 2 most likely differential causes for the rash. (2 marks)",
       a:`<ul><li><strong>Cutaneous decompression illness</strong> (cutis marmorata — livedo reticularis pattern)</li><li><strong>Dermatitis / allergic reaction</strong> (e.g. to wetsuit neoprene)</li></ul>`},
      {q:"(b) List 6 risk factors for decompression illness. (6 marks)",
       a:`<ul><li>Increased dive duration</li><li>Multiple dives in a day/short surface interval</li><li>Dehydration</li><li>Strenuous exercise within 4 hours of diving</li><li>Cold water exposure</li><li>Ascent to altitude soon after diving (including air travel)</li><li>Obesity; smoking; alcohol; patent foramen ovale (PFO)</li></ul>`},
      {q:"(c) 2 advantages and 2 disadvantages of aeromedical helicopter retrieval. (4 marks)",
       a:`<p><strong>Advantages:</strong></p>
       <ul><li><strong>Speed</strong> — fastest mode of inter-hospital transfer</li><li>Can transfer directly between facilities with heliports; less turbulence than fixed-wing</li></ul>
       <p><strong>Disadvantages:</strong></p>
       <ul><li><strong>Cannot be pressurised</strong> — altitude exposure worsens DCI by expanding nitrogen bubbles</li><li>Vibration may worsen DCI; small cabin space; weather limitations (night, fog)</li></ul>
       <p><em>Preferred option: ground ambulance or fixed-wing aircraft pressurised to sea level if available.</em></p>`}
    ]
  },

  {
    id:"sant_2019_2_q17",paper:"SA/NT 2019.2",qnum:"Q17",marks:12,
    topics:["Paediatrics","Infectious Disease / Sepsis"],
    subtopics:["Paediatric Emergencies","Anaphylaxis"],
    title:"7yo anaphylaxis from peanut butter — estimated weight, adrenaline dose, admission indications",
    stem:"A 7-year-old boy with anaphylaxis after eating peanut butter sandwich. HR 140, SpO2 90% with wheeze (no stridor), RR 42, BP 75/45, GCS 15. No known allergies.",
    parts:[
      {q:"(a) Estimated weight and formula. (2 marks)",
       a:`<ul><li><strong>APLS formula:</strong> (Age + 4) × 2 = (7 + 4) × 2 = <strong>22 kg</strong></li><li><strong>Alternative:</strong> 3 × age + 7 = 28 kg (newer formula); or 4 × age = 28 kg (5–14 yr)</li></ul>`},
      {q:"(b) List 3 most important treatments with details. (6 marks)",
       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
         <tr style="background:rgba(255,255,255,0.08)"><th style="padding:6px 10px;border:1px solid #30363d">Treatment</th><th style="padding:6px 10px;border:1px solid #30363d">Dose / Route / Details</th></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>Adrenaline (epinephrine)</strong></td><td style="padding:6px 10px;border:1px solid #30363d">10 mcg/kg = 0.01 ml/kg of 1:1000 = <strong>0.22 ml IM</strong> (anterolateral thigh); repeat every 5–15 min if needed</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>Salbutamol nebuliser</strong></td><td style="padding:6px 10px;border:1px solid #30363d">5 mg nebulised — for bronchospasm/wheeze component</td></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>IV fluid bolus (0.9% NaCl)</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Up to 20 ml/kg = 440 ml IV bolus — for haemodynamic instability (BP 75/45)</td></tr>
       </table>`},
      {q:"(c) List 4 indications for inpatient admission. (4 marks)",

  {
    id:"sant_2019_2_q20",paper:"SA/NT 2019.2",qnum:"Q20",marks:11,
    topics:["Renal & Urology","Paediatrics"],
    subtopics:["Renal Emergencies","Paediatric Emergencies"],
    title:"6yo with haematuria post-febrile illness and skin sores — glomerulonephritis types, PSGN diagnosis, investigations",
    stem:"A 6-year-old boy, recent febrile illness, healing skin sores on leg, dark urine, periorbital puffiness. BP 135/85. Microscopy: RBC casts (upper tract haematuria).",
    parts:[
      {q:"(a) List 3 disease entities producing upper tract haematuria. (3 marks)",
       a:`<ul><li><strong>Post-streptococcal glomerulonephritis (PSGN)</strong></li><li>IgA nephropathy (Berger's disease)</li><li>Membranoproliferative glomerulonephritis</li><li>Vasculitis — HUS, HSP nephritis</li><li>Alport syndrome; tumour (Wilms'); interstitial nephritis</li></ul>`},
      {q:"List 4 specific history features to narrow the diagnosis. (4 marks)",
       a:`<ul><li>When was the fever? Nature of illness — sore throat (strep pharyngitis → PSGN) vs skin infection/impetigo (also PSGN)</li><li>Recent medications including antibiotics</li><li>Rash — purpuric (HSP); family history of renal disease (Alport)</li><li>Diarrhoea and abdominal pain (HUS — E. coli O157:H7); previous episodes of haematuria</li></ul>`},
      {q:"(b) Most likely diagnosis. (1 mark)",
       a:`<p><strong>Post-streptococcal glomerulonephritis (PSGN)</strong> — recent febrile illness, skin sores (impetigo), haematuria with RBC casts, periorbital oedema, hypertension.</p>`},
      {q:"(c) List 3 further investigations with explanation. (3 marks)",
       a:`<ul><li><strong>ASOT (Anti-Streptolysin O titre):</strong> Evidence of recent streptococcal infection</li><li><strong>Complement levels (C3/C4):</strong> Low C3 supports PSGN (complement consumption); normal in IgA nephropathy</li><li><strong>Throat/skin swab culture:</strong> Identify streptococcal infection; urine M&C to exclude UTI; FBC for platelet count (low in HUS/TTP)</li></ul>`}
    ]
  },

  {
    id:"sant_2019_2_q21",paper:"SA/NT 2019.2",qnum:"Q21",marks:13,
    topics:["Paediatrics","Metabolic & Endocrine"],
    subtopics:["Neonatal Emergencies","Other Endocrine"],
    title:"10-day-old neonatal crisis with hyperkalaemia, hypoglycaemia, acidosis — congenital adrenal hyperplasia",
    stem:"A 10-day-old boy: flat, not feeding for 24 hours, vomiting 12 hours. Dry mucous membranes, whimpering. Weight 4 kg. VBG: pH 7.28, K 7.1, Na 128, Glucose 2.2, Bicarb 13.",
    parts:[
      {q:"(a) List the 3 most important VBG abnormalities. (3 marks)",
       a:`<ul><li><strong>Severe hyperkalaemia</strong> — K 7.1 mmol/L (life-threatening arrhythmia risk)</li><li><strong>Hypoglycaemia</strong> — glucose 2.2 mmol/L</li><li><strong>Partially compensated metabolic acidosis</strong> — pH 7.28, bicarb 13</li><li>Mild hyponatraemia — Na 128</li></ul>`},
      {q:"(b) List 5 differential diagnoses other than congenital adrenal hyperplasia. (5 marks)",
       a:`<ul><li><strong>Dehydration</strong> — severe from poor feeding, vomiting</li><li><strong>Sepsis / neonatal sepsis</strong></li><li><strong>Renal failure</strong></li><li><strong>Malrotation with volvulus</strong></li><li><strong>Inborn error of metabolism</strong></li><li>Heart failure; pyloric stenosis</li></ul>`},
      {q:"(c) List 2 specific pathology tests to confirm congenital adrenal hyperplasia. (2 marks)",
       a:`<ul><li><strong>Serum 17-hydroxyprogesterone</strong> (markedly elevated in 21-hydroxylase deficiency — most common cause of CAH)</li><li><strong>Plasma cortisol</strong> (low); plasma ACTH (elevated); urinary steroid profile</li><li>Plasma renin activity (elevated in salt-wasting CAH)</li></ul>`},
      {q:"(d) List 3 treatments including doses. (3 marks)",
       a:`<ul><li><strong>Dextrose 10% 2–5 ml/kg IV</strong> — treat hypoglycaemia urgently</li><li><strong>Normal saline 10 ml/kg IV</strong> — volume replacement</li><li><strong>Hydrocortisone (stress dose):</strong> 25 mg IV initially then 5–10 mg 6-hourly — glucocorticoid and mineralocorticoid replacement</li><li><em>Optional:</em> Fludrocortisone 0.05–0.1 mg daily for mineralocorticoid replacement; calcium gluconate 0.5 ml/kg IV for severe hyperkalaemia</li></ul>`}
    ]
  },

  {
    id:"sant_2019_2_q22",paper:"SA/NT 2019.2",qnum:"Q22",marks:11,
    topics:["Ophthalmology"],
    subtopics:["Ocular Emergencies"],
    title:"78yo acute painless vision loss with cataract obscuring view — retinal detachment risk factors, investigations, CRAO treatment",
    stem:"A 78-year-old man with acute painless visual loss in right eye 1 hour ago. History of cataracts and hypertension. Posterior chamber not visible due to cataract.",
    parts:[
      {q:"(a) List 3 risk factors for retinal detachment. (3 marks)",
       a:`<ul><li>High myopia</li><li>Previous cataract surgery</li><li>Recent eye trauma</li><li>Past history of retinal detachment</li><li>Connective tissue disease (Marfan's)</li></ul>`},
      {q:"(b) List 6 investigations to help establish the diagnosis, with reasoning. (6 marks)",
       a:`<ul><li><strong>ECG:</strong> Identify AF or other embolic source → CRAO</li><li><strong>ESR/CRP:</strong> Markedly elevated → giant cell arteritis (temporal arteritis) as cause of AION</li><li>FBC — hyperviscosity, thrombocytosis</li><li>Coagulation studies — coagulopathy causing thrombosis</li><li>BSL — diabetes mellitus (risk for CRVO)</li><li><strong>Ocular ultrasound:</strong> Identify retinal detachment or vitreous haemorrhage when fundus not directly visible</li><li>CT/CTA or carotid ultrasound — embolic source for CRAO</li></ul>`},
      {q:"(c) List 2 treatments for CRAO with rationale. (2 marks)",
       a:`<ul><li><strong>Anterior chamber paracentesis:</strong> Reduces IOP → may dislodge or move embolus and restore perfusion</li><li><strong>Hyperbaric oxygen:</strong> Reduces retinal ischaemia during the period before reperfusion</li><li>Ocular massage — dislodge embolus; carbogen — vasodilate retinal vessels; tPA — lyse clot (limited evidence)</li></ul>`}
    ]
  },

  {
    id:"sant_2019_2_q23",paper:"SA/NT 2019.2",qnum:"Q23",marks:12,
    topics:["Obstetrics & Gynaecology"],
    subtopics:["Gynaecological Emergencies"],
    title:"22yo with right iliac fossa pain — PID vs appendicitis features, gynaecological differentials, USS and CT findings",
    stem:"A 22-year-old woman with right lower abdominal pain. LMP 2 weeks ago. Pregnancy test negative. Temp 37.5, HR 110, BP 130/80.",
    parts:[
      {q:"(a) List 3 history features favouring PID over acute appendicitis. (3 marks)",
       a:`<ul><li><strong>Absence of pain migration</strong> — appendicitis classically migrates from periumbilical to RIF; PID presents with diffuse lower abdominal pain</li><li><strong>Bilateral abdominal tenderness</strong> — PID typically bilateral; appendicitis usually right-sided</li><li><strong>Absence of nausea and vomiting</strong> — prominent in appendicitis, less in PID</li><li>Purulent vaginal discharge — suggests cervicitis/PID</li></ul>`},
      {q:"(b) List 5 gynaecological causes other than PID. (5 marks)",
       a:`<ul><li><strong>Ovarian torsion</strong> — sudden severe pain, may have nausea/vomiting</li><li><strong>Ruptured ovarian cyst</strong></li><li><strong>Haemorrhagic ovarian cyst</strong></li><li><strong>Mittelschmerz</strong> — mid-cycle pain at ovulation (LMP 2 weeks = likely ovulating)</li><li><strong>Endometriosis</strong> — cyclical pain, dysmenorrhoea</li><li>Fibroid complications; adenomyosis</li></ul>`},
      {q:"(c) List 2 USS and 2 CT findings consistent with PID. (4 marks)",
       a:`<p><strong>Ultrasound:</strong></p>
       <ul><li>Fluid in the pouch of Douglas</li><li>Fallopian tube thickening (&gt;5mm) or increased vascularity; tubo-ovarian abscess / complex adnexal mass</li></ul>
       <p><strong>CT Abdomen:</strong></p>
       <ul><li>Salpingitis — fat stranding around fallopian tubes</li><li>Obscuration of pelvic fascial planes; cervicitis; uterosacral ligament thickening; pelvic fluid or abscess</li></ul>`}
    ]
  },

  {
    id:"sant_2019_2_q24",paper:"SA/NT 2019.2",qnum:"Q24",marks:14,
    topics:["ENT"],
    subtopics:["ENT Emergencies"],
    title:"Severe bilateral epistaxis in hypertensive Asian male — causes, treatments, malignant features",
    stem:"A 42-year-old Asian man with acute severe bilateral epistaxis, anterior and posterior, despite 20 minutes of first aid. BP 170/95, HR 105.",
    parts:[
      {q:"(a) List 4 likely causes of epistaxis in an adult. (4 marks)",
       a:`<ul><li><strong>Hypertension</strong> — most common associated factor</li><li><strong>Anticoagulants/antiplatelets</strong> — warfarin, aspirin, clopidogrel, NOACs</li><li><strong>Trauma</strong> — nose-picking, nasal oxygen, CPAP, fractures</li><li><strong>Bleeding diathesis</strong> — von Willebrand disease, ITP, liver disease, haematological malignancy</li><li>Recreational drugs — cocaine, methamphetamine; alcohol; infection/inflammation (sinusitis, rhinitis)</li><li>Hereditary haemorrhagic telangiectasia (HHT/Osler-Weber-Rendu); nasopharyngeal carcinoma</li></ul>`},
      {q:"(b) Outline 5 treatments you will consider. (5 marks)",
       a:`<ul><li><strong>First aid</strong> — lean forward, pinch soft nose, ice pack, do not swallow blood</li><li><strong>Chemical cautery</strong> — silver nitrate (anterior vessel); or electrocautery</li><li><strong>Nasal packing</strong> — Merocel/Rapid Rhino tampon for anterior; BIPP or Foley catheter for posterior bleeding</li><li><strong>Antihypertensive therapy</strong> — reduce BP</li><li><strong>Topical tranexamic acid</strong> — particularly if on antiplatelet agents</li><li>IV access and IV fluids if haemodynamically compromised; urgent ENT referral if uncontrolled</li></ul>`},
      {q:"(c) List 5 concerning features for malignant cause of epistaxis. (5 marks)",
       a:`<ul><li>Unilateral nasal blockage ± unilateral discharge</li><li>Localised cervical lymphadenopathy</li><li>Hearing loss (Eustachian tube involvement by NPC)</li><li>Trismus</li><li>Local oral features — ill-fitting dentures, buccal soft tissue swelling, loose teeth</li><li>Neuralgia/cranial nerve involvement</li><li>Risk factors — SE Asian/Chinese ethnicity, tobacco, alcohol, EBV exposure (NPC risk factors)</li></ul>`}
    ]
  },

  {
    id:"sant_2019_2_q25",paper:"SA/NT 2019.2",qnum:"Q25",marks:16,
    topics:["Psychiatry & Behavioural"],
    subtopics:["Mental Health Emergencies"],
    title:"21yo with paranoid delusions (bikies chasing him) — primary psychosis features, medical clearance, chemical vs physical restraint",
    stem:"A 21-year-old male, first ED presentation, believes he is being chased by bikies. Moderately agitated but alert and orientated. BP 115/70, HR 80, Temp 36.9°C.",
    parts:[
      {q:"(a) List 6 history/examination features making primary psychosis more likely. (6 marks)",
       a:`<p><strong>History:</strong></p>
       <ul><li>Age of onset — schizophrenia typically 15–25 years (75% of cases)</li><li>Family history of schizophrenia</li><li>Subacute onset — drug-induced psychosis tends to be more acute</li><li>Impaired social/occupational functioning</li></ul>
       <p><strong>Examination:</strong></p>
       <ul><li>Thought disorder — tangential, circumstantial, loose associations</li><li>Predominantly auditory hallucinations despite normal LOC</li><li>Multiple different types of delusions (vs single fixed delusion)</li><li>Inappropriate affect / emotional blunting; lack of insight</li></ul>`},
      {q:"(b) List 2 reasons why medical assessment is important. (2 marks)",
       a:`<ul><li>Determine if a <strong>medical illness is causing the presentation</strong> — many medical conditions mimic psychosis (delirium, encephalitis, metabolic, toxicological)</li><li>Identify <strong>concurrent acute medical illness requiring urgent treatment</strong></li><li>Identify side-effects of current psychiatric treatment requiring urgent management</li></ul>`},
      {q:"(c) Complete the table — types of restraint with advantages and disadvantages. (8 marks)",
       a:`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
         <tr style="background:rgba(255,255,255,0.08)"><th style="padding:6px 10px;border:1px solid #30363d">Type</th><th style="padding:6px 10px;border:1px solid #30363d">Advantages</th><th style="padding:6px 10px;border:1px solid #30363d">Disadvantages</th></tr>
         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>Chemical restraint</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Sedating and anxiolytic; antipsychotic treatment if psychosis; multiple routes (PO/IM/IV); can de-escalate without physical restraint; less injury risk</td><td style="padding:6px 10px;border:1px solid #30363d">Airway compromise/aspiration; requires monitoring; reduces ability to assess; unexpected drug reactions; slower to gain control</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>Physical restraint</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Protects staff/patient/others; enables safe IM/IV drug access; immediate control once team assembled</td><td style="padding:6px 10px;border:1px solid #30363d">Risk of injury to patient and staff; sympathomimetic response; requires 5–6 trained staff; ongoing 1:1 monitoring; requires chemical restraint also</td></tr>
       </table>`}
    ]
  },

  {

    stem:"A 50-year-old man presents with abrupt involuntary movements of his right arm and leg.",

      {q:"(a) Which 2 descending pathways control voluntary skeletal muscle movement? (4 marks)",

         <tr><td style="padding:6px 10px;border:1px solid #30363d"><strong>Corticospinal tract</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Voluntary skeletal muscle of body and limbs</td></tr>
         <tr style="background:rgba(255,255,255,0.04)"><td style="padding:6px 10px;border:1px solid #30363d"><strong>Corticobulbar tract</strong></td><td style="padding:6px 10px;border:1px solid #30363d">Cranial nerve motor nuclei (face, tongue, pharynx)</td></tr>

      {q:"(b) What part of the nervous system controls involuntary movement? (1 mark)",
       a:`<p><strong>Extrapyramidal system</strong> — specifically the basal ganglia and subthalamic nucleus</p>`},
